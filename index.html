            <div style={{fontSize:9,color:"#47FFB8",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:4}}>RESULT LOGGED</div>
            <div style={{fontFamily:"'Pirata One',cursive",fontSize:32,color:"#47FFB8",letterSpacing:2}}>{time}</div>
            <div style={{fontSize:11,color:"#666",fontFamily:"'DM Mono',monospace",marginTop:4}}>5K Time Trial · Week 12</div>
          </div>
          <div style={{background:"var(--card)",borderRadius:10,padding:"14px",marginBottom:16}}>
            <div style={{fontSize:9,color:"#E8FF47",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:12}}>YOUR NEW TRAINING PACES</div>
            {[["Easy / Z2",targets.easy,"#47FFB8"],["Tempo",targets.tempo,"#E8FF47"],["400m Reps",targets.reps,"#FF4747"],["10K Pace",targets.tenK,"#FF8C47"]].map(([lbl,val,col])=>(
              <div key={lbl} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid var(--border)`}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:col}}/>
                  <span style={{fontSize:12,color:"#bbb",fontFamily:"'Barlow',sans-serif"}}>{lbl}</span>
                </div>
                <span style={{fontSize:13,fontFamily:"'DM Mono',monospace",color:col}}>{val}/km</span>
              </div>
            ))}
          </div>
          <div style={{background:"#FF6B4710",border:"1px solid #FF6B4730",borderRadius:10,padding:"14px",marginBottom:16}}>
            <div style={{fontSize:9,color:"#FF6B47",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:6}}>NEXT GOAL</div>
            <div style={{fontFamily:"'Pirata One',cursive",fontSize:22,color:"#FF6B47",letterSpacing:1,marginBottom:6}}>{targets.nextGoal}</div>
            <div style={{fontSize:11,color:"#666",fontFamily:"'DM Mono',monospace",lineHeight:1.7}}>Start a fresh 12-week block with your new paces. Increase interval reps by 1 from week 1. Your aerobic base is built — now we sharpen it further.</div>
          </div>
        </div>
      )}
      <div style={{background:"var(--card)",borderRadius:10,padding:"14px",marginBottom:16}}>
        <div style={{fontSize:9,color:"#47C8FF",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:10}}>PROGRESSION LADDER</div>
        {Object.entries(POST_PLAN_TARGETS).map(([key,val])=>(
          <div key={key} style={{padding:"8px 0",borderBottom:`1px solid var(--border)`}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontFamily:"'Pirata One',cursive",fontSize:16,color:"#47C8FF",letterSpacing:1}}>{key}</span>
              <span style={{fontSize:10,color:"var(--dim)",fontFamily:"'DM Mono',monospace"}}>→ {val.nextGoal.split(" in")[0]}</span>
            </div>
            <div style={{fontSize:9,color:"#444",fontFamily:"'DM Mono',monospace"}}>Easy: {val.easy} · Tempo: {val.tempo} · Reps: {val.reps}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────
function App(){
  const[week,setWeek]=useState(0);
  const[dayIdx,setDayIdx]=useState(0);
  const[view,setView]=useState("day");
  const[checked,setChecked]=useState(()=>{try{const s=localStorage.getItem("sc_progress");return s?JSON.parse(s):{}}catch{return{}}});
  const[missed,setMissed]=useState(()=>{try{const s=localStorage.getItem("sc_missed");return s?JSON.parse(s):{}}catch{return{}}});
  const[sessionLogs,setSessionLogs]=useState(()=>{try{const s=localStorage.getItem("sc_logs");return s?JSON.parse(s):{}}catch{return{}}});
  const[readiness,setReadiness]=useState(()=>{try{const s=localStorage.getItem("sc_readiness");return s?JSON.parse(s):{}}catch{return{}}});
  const[startDate,setStartDate]=useState(()=>{try{return localStorage.getItem("sc_startdate")||null}catch{return null}});
  const[theme,setTheme]=useState(()=>{try{return localStorage.getItem("sc_theme")||"dark"}catch{return"dark"}});
  const[weekNotes,setWeekNotes]=useState(()=>{try{const s=localStorage.getItem("sc_weeknotes");return s?JSON.parse(s):{}}catch{return{}}});
  const[injuryFlags,setInjuryFlags]=useState(()=>{try{const s=localStorage.getItem("sc_injuries");return s?JSON.parse(s):{}}catch{return{}}});
  const[fiveKTimes,setFiveKTimes]=useState(()=>{try{const s=localStorage.getItem("sc_5ktimes");return s?JSON.parse(s):[]}catch{return[]}});
  const[easyPaceSecs,setEasyPaceSecs]=useState(()=>{try{return parseInt(localStorage.getItem("sc_easypace")||"360")}catch{return 360}});
  useEffect(()=>{try{localStorage.setItem("sc_easypace",easyPaceSecs)}catch{}},[easyPaceSecs]);
  const PACES_COMPUTED=computePaces(easyPaceSecs);
  const[showInjury,setShowInjury]=useState(false);
  const[showReset,setShowReset]=useState(false);
  const[showOverview,setShowOverview]=useState(false);
  const[showSwap,setShowSwap]=useState(false);
  const[showShare,setShowShare]=useState(false);
  const[showAddSession,setShowAddSession]=useState(false);
  const[customSessions,setCustomSessions]=useState(()=>{try{const s=localStorage.getItem("sc_custom");return s?JSON.parse(s):{}}catch{return{}}});
  const[swaps,setSwaps]=useState(()=>{try{const s=localStorage.getItem("sc_swaps");return s?JSON.parse(s):{}}catch{return{}}});
  const[toast,setToast]=useState(null);
  const[showReadiness,setShowReadiness]=useState(false);
  const[logModal,setLogModal]=useState(null);
  const toastRef=useRef(null);
  const touchStartX=useRef(null);
  const th=THEMES[theme]||THEMES.dark;

  useEffect(()=>{try{localStorage.setItem("sc_progress",JSON.stringify(checked))}catch{}},[checked]);
  useEffect(()=>{try{localStorage.setItem("sc_missed",JSON.stringify(missed))}catch{}},[missed]);
  useEffect(()=>{try{localStorage.setItem("sc_logs",JSON.stringify(sessionLogs))}catch{}},[sessionLogs]);
  useEffect(()=>{try{localStorage.setItem("sc_readiness",JSON.stringify(readiness))}catch{}},[readiness]);
  useEffect(()=>{try{localStorage.setItem("sc_weeknotes",JSON.stringify(weekNotes))}catch{}},[weekNotes]);
  useEffect(()=>{try{localStorage.setItem("sc_injuries",JSON.stringify(injuryFlags))}catch{}},[injuryFlags]);
  useEffect(()=>{try{localStorage.setItem("sc_theme",theme)}catch{}},[theme]);
  useEffect(()=>{try{localStorage.setItem("sc_swaps",JSON.stringify(swaps))}catch{}},[swaps]);
  useEffect(()=>{try{localStorage.setItem("sc_custom",JSON.stringify(customSessions))}catch{}},[customSessions]);

  const handleSwap=(fromIdx,toIdx)=>{
    // Record swap for this week: swap fromIdx and toIdx day indices
    const key=`${week}`;
    setSwaps(p=>{
      const wkSwaps={...(p[key]||{})};
      // Toggle: if already swapped back, remove
      if(wkSwaps[fromIdx]===toIdx){delete wkSwaps[fromIdx];delete wkSwaps[toIdx];}
      else{wkSwaps[fromIdx]=toIdx;wkSwaps[toIdx]=fromIdx;}
      return{...p,[key]:wkSwaps};
    });
    setShowSwap(false);
    showToast(`${wkData[fromIdx].label} ⇄ ${wkData[toIdx].label}`);
  };

  const showToast=msg=>{setToast(msg);clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(null),2400)};
  const handleTouchStart=e=>{if(view==="day")touchStartX.current=e.touches[0].clientX;};
  const handleTouchEnd=e=>{
    if(touchStartX.current===null||view!=="day")return;
    const diff=touchStartX.current-e.changedTouches[0].clientX;
    if(Math.abs(diff)>60){
      if(diff>0)setDayIdx(i=>Math.min(i+1,weekData[week].length-1));
      else setDayIdx(i=>Math.max(i-1,0));
    }
    touchStartX.current=null;
  };
  const toggleSession=key=>{
    setChecked(p=>({...p,[key]:!p[key]}));
    // if marking done, clear any missed flag
    setMissed(p=>{const n={...p};delete n[key];return n;});
  };
  const toggleMissed=key=>{
    setMissed(p=>({...p,[key]:!p[key]}));
    // if marking missed, clear any done flag
    setChecked(p=>{const n={...p};delete n[key];return n;});
  };

  useEffect(()=>{
    const day=weekData[week][dayIdx];
    const allActioned=day.sessions.every((_,si)=>checked[sKey(week,dayIdx,si)]||missed[sKey(week,dayIdx,si)]);
    if(!allActioned)return;
    const ndi=dayIdx+1;
    if(ndi<weekData[week].length){
      const t=setTimeout(()=>{setDayIdx(ndi);showToast(`${day.label} done ✓  →  ${weekData[week][ndi].label}`)},600);
      return()=>clearTimeout(t);
    }else{
      const nwk=week+1;
      if(nwk<12){const t=setTimeout(()=>{if(typeof confetti!=="undefined")confetti({particleCount:100,spread:70,origin:{y:0.4},colors:["#E8FF47","#47FFB8","#47C8FF","#FF6B47"]});setWeek(nwk);setDayIdx(0);showToast(`Week ${week+1} complete! 🏆`)},800);return()=>clearTimeout(t);}
      else showToast("Plan complete! 🏁 Time to race.");
    }
  },[checked,missed]);

  // Streak: consecutive days with all sessions actioned
  const streak=React.useMemo(()=>{
    let s=0;
    outer:for(let w=week;w>=0;w--){
      const days=weekData[w];
      for(let di=days.length-1;di>=0;di--){
        const keys=days[di].sessions.map((_,si)=>sKey(w,di,si));
        if(keys.every(k=>checked[k]||missed[k]))s++;
        else break outer;
      }
    }
    return s;
  },[checked,missed,week]);

  const wkKeys=w=>weekData[w].flatMap((d,di)=>d.sessions.map((_,si)=>sKey(w,di,si)));
  const wkDone=w=>wkKeys(w).filter(k=>checked[k]).length;
  const wkMissed=w=>wkKeys(w).filter(k=>missed[k]).length;
  const wkTotal=w=>wkKeys(w).length;
  const done=Object.values(checked).filter(Boolean).length;
  const missedCount=Object.values(missed).filter(Boolean).length;
  const pct=Math.round((done/TOTAL_SESSIONS)*100);
  const missedPct=Math.round((missedCount/TOTAL_SESSIONS)*100);

  const handleAddSession=(session)=>{
    const key=`${week}-${dayIdx}`;
    setCustomSessions(p=>{
      const existing=p[key]||[];
      return{...p,[key]:[...existing,session]};
    });
    setShowAddSession(false);
    showToast(`${session.title} added ✓`);
  };

  const removeCustomSession=(dayKey,idx)=>{
    setCustomSessions(p=>{
      const existing=[...(p[dayKey]||[])];
      existing.splice(idx,1);
      const next={...p};
      if(existing.length===0)delete next[dayKey];
      else next[dayKey]=existing;
      return next;
    });
  };

  const dayDate=startDate?addDays(new Date(startDate),week*7+dayIdx):null;
  const wkData=weekData[week];

  // Apply any recorded day swaps for this week
  const wkSwapMap=swaps[String(week)]||{};
  const effectiveWkData=wkData.map((day,di)=>{
    const swappedFrom=wkSwapMap[di];
    if(swappedFrom!==undefined){
      // This day's sessions come from the swapped day, but keep the label/day name
      return{...wkData[swappedFrom],day:day.day,label:day.label};
    }
    return day;
  });

  const dayData=effectiveWkData[dayIdx];
  const customDaySessions=(customSessions[`${week}-${dayIdx}`]||[]);
  const wkNum=week+1;
  const isDeload=wkNum===4||wkNum===8;
  const isPeak=wkNum===12;
  const phase=phases.find(p=>p.weeks.includes(wkNum));
  const todayKey=`r-${week}-${dayIdx}`;
  const todayReadiness=readiness[todayKey];

  const resetPlan=()=>{
    ["sc_progress","sc_missed","sc_logs","sc_readiness","sc_weeknotes","sc_5ktimes","sc_racechecks","sc_startdate"].forEach(k=>{try{localStorage.removeItem(k)}catch{}});
    setChecked({});setMissed({});setSessionLogs({});setReadiness({});setWeekNotes({});setFiveKTimes([]);
    setWeek(0);setDayIdx(0);setStartDate(null);setShowReset(false);
    showToast("Plan reset — set a new start date");
  };

  // Load score: sum of (RPE × session count) for completed sessions in a week
  const wkLoadScore=w=>{
    let total=0;
    weekData[w].forEach((day,di)=>{
      day.sessions.forEach((s,si)=>{
        const k=sKey(w,di,si);
        if(checked[k]){
          const log=sessionLogs[`log-${w}-${di}-${si}`];
          total+=(log?.rpe||s.rpe);
        }
      });
    });
    return total;
  };
  const maxLoad=Math.max(...Array.from({length:12},(_,i)=>wkLoadScore(i)),1);

  const exportWeek=()=>{
    let txt=`SUPPER CLUB — Week ${wkNum}\n${"=".repeat(28)}\n\n`;
    if(startDate)txt+=`Week of ${addDays(new Date(startDate),week*7).toLocaleDateString("en-GB",{day:"numeric",month:"long"})}\n\n`;
    effectiveWkData.forEach((day,di)=>{
      txt+=`${day.label.toUpperCase()}\n`;
      day.sessions.forEach((s,si)=>{
        const k=sKey(week,di,si);
        const status=checked[k]?"✓ DONE":missed[k]?"✗ MISSED":"○ PENDING";
        const log=sessionLogs[`log-${week}-${di}-${si}`];
        txt+=`  ${status} ${s.title}${log?.pace?" ["+log.pace+"]":""}\n`;
      });
      txt+="\n";
    });
    if(weekNotes[week])txt+=`Notes:\n${weekNotes[week]}\n`;
    const blob=new Blob([txt],{type:"text/plain"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`supperclub-week${wkNum}.txt`;a.click();URL.revokeObjectURL(url);
    showToast("Week exported ✓");
  };

  const tabs=[["day","DAY"],["paces","PACES"],["stats","STATS"],["race","RACE DAY"],["next","NEXT STEPS"]];

  if(!startDate){
    return <CalendarSetupModal onSave={d=>{setStartDate(d);try{localStorage.setItem("sc_startdate",d)}catch{}}}/>;
  }

  return(
    <div className={theme==="crimson"?"theme-crimson":""} style={{minHeight:"100vh",background:"var(--bg)",color:"var(--text)",fontFamily:"'Barlow',sans-serif",paddingBottom:60}}
      onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",zIndex:9999,background:"#1a2a1a",border:"1px solid #47FFB860",borderRadius:10,padding:"10px 18px",fontSize:12,fontFamily:"'DM Mono',monospace",color:"#47FFB8",boxShadow:"0 4px 24px rgba(0,0,0,0.7)",whiteSpace:"nowrap",animation:"fadeIn 0.2s ease"}}>{toast}</div>}
      {showReadiness&&<ReadinessModal dateKey={todayKey} existing={todayReadiness} onSave={d=>{setReadiness(p=>({...p,[todayKey]:d}));setShowReadiness(false);showToast("Readiness saved ✓")}} onClose={()=>setShowReadiness(false)}/>}
      {logModal&&<SessionLogModal session={logModal.session} logKey={logModal.key} existing={sessionLogs[logModal.key]} onSave={d=>{setSessionLogs(p=>({...p,[logModal.key]:d}));setLogModal(null);showToast("Session logged ✓")}} onClose={()=>setLogModal(null)}/>}

      {/* RESET MODAL */}
      {showReset&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{width:"100%",maxWidth:320,background:"var(--bg2)",borderRadius:16,padding:24,animation:"slideIn 0.2s ease",border:"1px solid #FF474740"}}>
            <div style={{fontFamily:"'Pirata One',cursive",fontSize:24,letterSpacing:2,color:"#FF4747",marginBottom:8}}>Reset Plan?</div>
            <div style={{fontSize:12,color:"var(--muted)",fontFamily:"'DM Mono',monospace",lineHeight:1.7,marginBottom:20}}>
              This wipes all progress, session logs, readiness checks, 5K times and week notes. Your injury flags and theme stay.<br/><br/>
              <span style={{color:"#FF4747"}}>This cannot be undone.</span>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowReset(false)} style={{flex:1,padding:"12px 0",background:"var(--border)",border:"1px solid #2a2a2a",borderRadius:8,color:"var(--muted)",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:12}}>CANCEL</button>
              <button onClick={resetPlan} style={{flex:1,padding:"12px 0",background:"#FF474720",border:"1px solid #FF474750",borderRadius:8,color:"#FF4747",cursor:"pointer",fontFamily:"'Pirata One',cursive",fontSize:16,letterSpacing:1}}>RESET</button>
            </div>
          </div>
        </div>
      )}

      {showSwap&&<SwapModal week={week} dayIdx={dayIdx} wkData={effectiveWkData} swaps={swaps} onSave={handleSwap} onClose={()=>setShowSwap(false)}/>}
      {showShare&&<ShareWeekModal week={week} wkNum={wkNum} wkData={effectiveWkData} checked={checked} missed={missed} sessionLogs={sessionLogs} phase={phase} startDate={startDate} onClose={()=>setShowShare(false)}/>}
      {showAddSession&&<AddSessionModal onSave={handleAddSession} onClose={()=>setShowAddSession(false)}/>}

      {/* INJURY MODAL */}
      {showInjury&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:1000,display:"flex",alignItems:"flex-end"}}>
          <div style={{width:"100%",background:"var(--bg2)",borderRadius:"16px 16px 0 0",padding:24,animation:"slideIn 0.2s ease"}}>
            <div style={{fontFamily:"'Pirata One',cursive",fontSize:20,letterSpacing:2,color:"#FFB347",marginBottom:4}}>Injury Flags</div>
            <div style={{fontSize:10,color:"var(--dim)",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:16}}>SESSIONS WILL SHOW A WARNING FOR FLAGGED AREAS</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
              {INJURY_ZONES.map(z=>{
                const active=injuryFlags[z];
                return(<button key={z} onClick={()=>setInjuryFlags(p=>({...p,[z]:!p[z]}))} style={{padding:"8px 12px",borderRadius:8,border:`1px solid ${active?"#FFB347":"var(--border)"}`,background:active?"#FFB34720":"var(--card)",color:active?"#FFB347":"#666",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>{active?"⚠️ ":""}{z}</button>);
              })}
            </div>
            <button onClick={()=>setShowInjury(false)} style={{width:"100%",padding:"12px 0",background:"var(--border)",border:"1px solid #2a2a2a",borderRadius:8,color:"var(--muted)",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>DONE</button>
          </div>
        </div>
      )}

      {/* HEADER */}
      <div style={{background:"var(--bg)",padding:"44px 20px 14px",borderBottom:`1px solid var(--border)`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:3,color:"var(--dim)",marginBottom:4}}>12-WEEK ATHLETE PERFORMANCE PLAN</div>
            <h1 style={{fontFamily:"'Pirata One',cursive",fontSize:34,margin:0,lineHeight:1.1,letterSpacing:2}}>
              SUPPER CLUB<br/>
              <span style={{color:phase?.color??"#E8FF47"}}>{isPeak?"TEST YOURSELF.":isDeload?"RECOVER HARDER.":(phase?.label.split("—")[1].trim()??"BUILD")+"."}</span>
            </h1>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
            {/* Readiness */}
            <button onClick={()=>setShowReadiness(true)} style={{background:todayReadiness?`${todayReadiness.avg>=4?"#47FFB8":todayReadiness.avg>=3?"#E8FF47":todayReadiness.avg>=2?"#FFB347":"#FF4747"}15`:"var(--card)",border:`1px solid ${todayReadiness?todayReadiness.avg>=4?"#47FFB840":todayReadiness.avg>=3?"#E8FF4740":todayReadiness.avg>=2?"#FFB34740":"#FF474740":"#222"}`,borderRadius:10,padding:"7px 10px",cursor:"pointer",textAlign:"center",minWidth:54}}>
              <div style={{fontSize:16}}>{todayReadiness?["😖","😤","😐","😊","🤩"][Math.round(todayReadiness.avg)-1]:"💤"}</div>
              <div style={{fontSize:7,fontFamily:"'DM Mono',monospace",color:"#444",marginTop:2,letterSpacing:1}}>{todayReadiness?`${todayReadiness.avg}/5`:"READY?"}</div>
            </button>
            {/* Theme toggle */}
            <button onClick={()=>setTheme(t=>t==="dark"?"crimson":"dark")} style={{background:theme==="crimson"?"#2d0808":"var(--card)",border:`1px solid ${theme==="crimson"?"#ff444440":"#222"}`,borderRadius:8,padding:"5px 8px",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:9,color:theme==="crimson"?"#ff4444":"#666",letterSpacing:1}}>
              {theme==="crimson"?"🌙 DARK":"🩸 CRIMSON"}
            </button>
          </div>
        </div>

        {/* Streak + date + countdown chips */}
        <div style={{display:"flex",gap:8,marginTop:10,marginBottom:4,flexWrap:"wrap"}}>
          {streak>0&&<div style={{background:"#E8FF4712",border:"1px solid #E8FF4730",borderRadius:6,padding:"4px 10px",display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:12}}>🔥</span>
            <span style={{fontFamily:"'Pirata One',cursive",fontSize:14,color:"#E8FF47"}}>{streak} day streak</span>
          </div>}
          {/* Next session countdown */}
          {(()=>{
            if(!startDate)return null;
            const now=new Date();
            // Find next unchecked session with a real time
            for(let w=week;w<12;w++){
              for(let di=0;di<weekData[w].length;di++){
                const day=weekData[w][di];
                for(let si=0;si<day.sessions.length;si++){
                  const k=sKey(w,di,si);
                  if(checked[k]||missed[k])continue;
                  const s=day.sessions[si];
                  if(!s.time||s.time==="-"||s.time==="—")continue;
                  const sessionDate=addDays(new Date(startDate),w*7+di);
                  const[hh,mm]=s.time.split(":").map(Number);
                  sessionDate.setHours(hh,mm,0,0);
                  const diffMs=sessionDate-now;
                  if(diffMs<0)continue;
                  const diffH=Math.floor(diffMs/3600000);
                  const diffM=Math.floor((diffMs%3600000)/60000);
                  const label=diffH>24?`${Math.floor(diffH/24)}d ${diffH%24}h`:diffH>0?`${diffH}h ${diffM}m`:`${diffM}m`;
                  const cfg=T[s.type];
                  return(
                    <div style={{background:`${cfg.color}12`,border:`1px solid ${cfg.color}30`,borderRadius:6,padding:"4px 10px",display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:10}}>⏱</span>
                      <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:cfg.color}}>{label} · {s.title.split(" ").slice(0,2).join(" ")}</span>
                    </div>
                  );
                }
              }
            }
            return null;
          })()}
          {Object.values(injuryFlags).some(Boolean)&&<button onClick={()=>setShowInjury(true)} style={{background:"#FFB34715",border:"1px solid #FFB34730",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10,color:"#FFB347"}}>
            ⚠️ {Object.values(injuryFlags).filter(Boolean).length} niggle{Object.values(injuryFlags).filter(Boolean).length>1?"s":""}
          </button>}

                  {supps.map((s,i)=>(
                    <div key={i} style={{display:"flex",gap:12,padding:"7px 0",borderBottom:i<supps.length-1?"1px solid #1e1e1e":"none"}}>
                      <div style={{minWidth:68}}>
                        <div style={{fontSize:8,fontFamily:"'DM Mono',monospace",color:s.color,letterSpacing:1}}>{s.time.toUpperCase()}</div>
                        <div style={{fontSize:11,fontFamily:"'Pirata One',cursive",color:s.color}}>{s.dose}</div>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,color:"#ccc",fontFamily:"'Barlow',sans-serif",fontWeight:500}}>{s.name}</div>
                        <div style={{fontSize:10,color:"var(--dim)",fontFamily:"'DM Mono',monospace",lineHeight:1.4}}>{s.note}</div>
                      </div>
                    </div>
                  ))}
                </div>
              );
            })()}

            {/* Fuel note */}
            <div style={{padding:"10px 14px",background:`${phase?.color??"#E8FF47"}08`,border:`1px solid ${phase?.color??"#E8FF47"}20`,borderRadius:10,marginBottom:20}}>
              <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:2,color:phase?.color??"#E8FF47",marginBottom:4}}>FUEL NOTE</div>
              <div style={{fontSize:11,color:"var(--dim)",fontFamily:"'DM Mono',monospace",lineHeight:1.7}}>
                {isDeload?"Deload — reduce carbs 15-20%. Keep protein at 1.8g/kg. Sleep is the priority.":isPeak?"Taper — carb load Thu-Sat. Big breakfast before 5K. No new foods on test day.":wkNum<=3?"Foundation — consistent eating. Hit protein daily. Carbs around every session.":wkNum<=7?"Development — add 300-400 kcal on double days. Carb load night before hard sessions.":"Sharpening — precision matters. Time carbs tightly. Electrolytes on doubles."}
              </div>
            </div>
          </div>
        </>
      )}



            {view==="paces"&&(
        <div style={{padding:"16px 20px 0"}}>
          <div style={{fontFamily:"'Pirata One',cursive",fontSize:28,letterSpacing:2,marginBottom:4}}>Training Paces</div>
          <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"var(--dim)",letterSpacing:2,marginBottom:16}}>DRAG SLIDER TO ADJUST YOUR EASY PACE — ALL ZONES RECALCULATE</div>

          {/* Easy pace slider */}
          <div style={{background:"var(--card)",borderRadius:10,padding:"14px",marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:"var(--muted)"}}>Easy Pace</span>
              <span style={{fontFamily:"'Pirata One',cursive",fontSize:22,color:"#47FFB8"}}>
                {Math.floor(easyPaceSecs/60)}:{String(easyPaceSecs%60).padStart(2,"0")}/km
              </span>
            </div>
            <input type="range" min={300} max={480} step={5} value={easyPaceSecs}
              onChange={e=>setEasyPaceSecs(Number(e.target.value))}/>
            <style>{"input[type=range]::-webkit-slider-thumb{background:#47FFB8}input[type=range]::-moz-range-thumb{background:#47FFB8}"}</style>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
              <span style={{fontSize:9,color:"#444",fontFamily:"'DM Mono',monospace"}}>5:00/km</span>
              <span style={{fontSize:9,color:"#444",fontFamily:"'DM Mono',monospace"}}>8:00/km</span>
            </div>
            <div style={{marginTop:10,padding:"8px 12px",background:"#47FFB810",border:"1px solid #47FFB820",borderRadius:6}}>
              <div style={{fontSize:10,color:"var(--dim)",fontFamily:"'DM Mono',monospace",lineHeight:1.6}}>
                Easy pace drives every zone. Adjust to match your current fitness — all session targets update instantly.
              </div>
            </div>
          </div>

          {/* All zones */}
          <div style={{background:"var(--card)",borderRadius:10,overflow:"hidden",marginBottom:16}}>
            {Object.entries(PACES_COMPUTED).map(([key,p],i,arr)=>(
              <div key={key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 14px",borderBottom:i<arr.length-1?"1px solid #1e1e1e":"none"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:p.color,flexShrink:0}}/>
                  <span style={{fontSize:12,color:"#ccc",fontFamily:"'Barlow',sans-serif"}}>{p.label}</span>
                </div>
                <span style={{fontSize:12,fontFamily:"'DM Mono',monospace",color:p.color,letterSpacing:0.5}}>{p.pace}</span>
              </div>
            ))}
          </div>

          {/* Phase progression */}
          <div style={{background:"var(--card)",borderRadius:10,padding:"14px",marginBottom:16}}>
            <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:3,color:"#E8FF47",marginBottom:10}}>PACE PROGRESSION BY PHASE</div>
            {[
              {phase:"Phase 1 (Wk 1-3)",color:"#E8FF47",adj:{reps:0,tempo:0,oneK:0}},
              {phase:"Phase 2 (Wk 5-7)",color:"#47C8FF",adj:{reps:-3,tempo:-5,oneK:-3}},
              {phase:"Phase 3 (Wk 9-11)",color:"#FF6B47",adj:{reps:-7,tempo:-10,oneK:-7}},
              {phase:"Week 12 Target",color:"#FFB347",adj:{reps:-12,tempo:-15,oneK:-12}},
            ].map((row,i)=>{
              const repSecs=paceToSecs(PACES_COMPUTED.reps400.pace.split("–")[0])||265;
              const tempoSecs=paceToSecs(PACES_COMPUTED.tempo.pace.split("–")[0])||305;
              const onekSecs=paceToSecs(PACES_COMPUTED.fiveK.pace.split("–")[0])||273;
              const fmt2=s=>{const v=s+row.adj.reps;return`${Math.floor(v/60)}:${String(v%60).padStart(2,"0")}/km`;};
              return(
                <div key={i} style={{padding:"8px 0",borderBottom:i<3?"1px solid #1e1e1e":"none"}}>
                  <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:2,color:row.color,marginBottom:5}}>{row.phase.toUpperCase()}</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {[["400m",repSecs+row.adj.reps],["Tempo",tempoSecs+row.adj.tempo],["1K",onekSecs+row.adj.oneK]].map(([lbl,s])=>(
                      <span key={lbl} style={{fontSize:10,fontFamily:"'DM Mono',monospace",background:`${row.color}12`,border:`1px solid ${row.color}30`,borderRadius:4,padding:"2px 8px",color:row.color}}>
                        {lbl}: {Math.floor(s/60)}:{String(s%60).padStart(2,"0")}/km
                      </span>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view==="stats"&&<StatsTab sessionLogs={sessionLogs} fiveKTimes={fiveKTimes} setFiveKTimes={setFiveKTimes}/>}
      {view==="race"&&<RaceDayTab/>}
      {view==="next"&&<PostPlanTab/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
