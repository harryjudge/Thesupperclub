<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0a;color:#f0f0f0;-webkit-tap-highlight-color:transparent}
body{overscroll-behavior:none}
::-webkit-scrollbar{display:none}
button{-webkit-appearance:none;appearance:none}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:#2a2a2a;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid #0a0a0a}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid #0a0a0a}
input[type=text],textarea{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;color:#f0f0f0;font-family:'DM Mono',monospace;font-size:12px;padding:8px 10px;width:100%;outline:none}
input[type=text]:focus,textarea:focus{border-color:#444}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tickBounce{0%{transform:scale(1)}40%{transform:scale(1.4)}70%{transform:scale(0.9)}100%{transform:scale(1)}}
@keyframes cardSlide{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.card-enter{animation:cardSlide 0.2s ease}
input[type=date]{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;color:#f0f0f0;font-family:'DM Mono',monospace;font-size:12px;padding:8px 10px;width:100%;outline:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:0.4}
</style>
</head>

function paceToSecs(str){if(!str)return null;const m=str.match(/(\d+):(\d+)/);return m?parseInt(m[1])*60+parseInt(m[2]):null;}
function secsToStr(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;}
function addDays(date,n){const d=new Date(date);d.setDate(d.getDate()+n);return d;}
function fmtDate(d){return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});}

// ── WEIGHT CALCULATOR ──────────────────────────────────────────────
function weights(p,isDeload){
  const s=isDeload?0.85:p===1?1:p===2?1.07:1.14;
  const r=(base)=>`${Math.round((base*s)/2.5)*2.5}kg`;
  return{
    trapDL:r(60),splitSquat:r(35),hipThrust:r(62),stepUp:r(22),
    powerClean:r(42),pullUp:p===1?"BW":"BW +5kg",dbRow:r(22),
    landmine:r(25),farmerCarry:r(28),
    nordics:"Bodyweight — control the descent",copHold:"Bodyweight",
    pallof:p===1?"10kg band/cable":p===2?"12.5kg":"15kg",
  };
}

// ── PLAN GENERATOR ─────────────────────────────────────────────────
// Double-day shape per week — 0 = single session only on that slot
// monGym/wedGym/friGym = PM gym after AM run
// tueB+tueSw = both 1 makes TUE a double | thuB+thuSw = both 1 makes THU a double
// Deload weeks (4,8) and taper (12): zero doubles by design
const WSHAPE={
  1: {monGym:1,tueB:1,tueSw:0,wedGym:0,thuB:0,thuSw:1,friGym:0}, // 1 double: MON
  2: {monGym:0,tueB:1,tueSw:0,wedGym:0,thuB:0,thuSw:1,friGym:1}, // 1 double: FRI
  3: {monGym:1,tueB:1,tueSw:1,wedGym:0,thuB:1,thuSw:0,friGym:1}, // 2 doubles: MON FRI + TUE
  4: {monGym:0,tueB:1,tueSw:0,wedGym:0,thuB:0,thuSw:1,friGym:0}, // 0 doubles — deload
  5: {monGym:1,tueB:1,tueSw:0,wedGym:0,thuB:1,thuSw:0,friGym:1}, // 2 doubles: MON FRI

  8: {monGym:0,tueB:0,tueSw:1,wedGym:0,thuB:1,thuSw:0,friGym:0}, // 0 doubles — deload
  9: {monGym:1,tueB:1,tueSw:0,wedGym:0,thuB:0,thuSw:1,friGym:1}, // 2 doubles: MON FRI
  10:{monGym:0,tueB:1,tueSw:1,wedGym:1,thuB:0,thuSw:0,friGym:1}, // 3 doubles: TUE WED FRI
  11:{monGym:1,tueB:1,tueSw:1,wedGym:0,thuB:1,thuSw:1,friGym:1}, // 3 doubles: MON TUE THU FRI
  12:{monGym:0,tueB:1,tueSw:0,wedGym:0,thuB:0,thuSw:1,friGym:0}, // 0 doubles — taper
};

const minsToKm=(mins)=>Math.round((mins/6)*10)/10;

function makeWeek(wk){
  const p=wk<=3?1:wk<=7?2:3;
  const isDeload=wk===4||wk===8;

  const W=weights(p,isDeload);
  const intReps=isDeload?5:p===1?7:p===2?9:10;
  const tempoMin=isDeload?15:p===1?22:p===2?28:32;
  const longMin=isDeload?55:p===1?75:p===2?90:isPeak?60:100;
  const bikeZ2=isDeload?45:p===1?70:p===2?85:90;
  const bikeTmp=isDeload?40:p===1?55:p===2?65:75;
  const kReps=isDeload?4:p===1?5:p===2?6:7;
  const swimDist=isDeload?"easy 800m":p===1?"4x300m":p===2?"4x400m":"5x400m";

  const adj1k=p===2?" (target 4:42)":p===3?" (target 4:38)":"";
  const adjTmp=p===2?" (push to 5:05-5:10)":p===3?" (push to 5:00-5:05)":"";
  const longKm=minsToKm(longMin);
  const n2=nutrition.doubleAM,n1=nutrition.singleAM;

  const monRun={slot:"AM",time:"06:30",type:"run",preRun:true,
    title:isDeload?"Easy Strides":"Track 400m Intervals",duration:isDeload?"35 min":"50 min",
    paceKeys:isDeload?["easy"]:["easy","reps400"],cooldown:isDeload?"easy":"intervals",mobility:"postRun",
    details:isDeload?["10 min easy @ 6:00-6:20/km","6x20s strides - fast but relaxed, full recovery","10 min easy cool-down"]

    rpe:isDeload?5:8};
  const monGym={slot:"PM",time:"19:00",type:"gym",preRun:false,
    title:"Lower Power + Speed Transfer",duration:isDeload?"40 min":"55 min",
    paceKeys:[],cooldown:"gym",mobility:"postGym",
    details:isDeload?["Trap bar deadlift 3x3 @ "+W.trapDL,"Box jump 3x4 - bodyweight","Core 10 min","10 min sauna"]

    gymExercises:isDeload?[]:["Trap bar deadlift","Bulgarian split squat","Nordic curl"],rpe:isDeload?5:7};
  const tueBike={slot:"AM",time:"06:30",type:"cycle",preRun:false,
    title:isDeload?"Easy Spin":"Bike Tempo Intervals",duration:isDeload?"40 min":bikeTmp+" min",
    paceKeys:[],cooldown:"easy",mobility:null,
    details:isDeload?["Pure easy Zone 2 spin","Cadence 85-90 rpm","No targets"]
      :["10 min easy spin warm-up","3x"+(p===1?10:p===2?13:15)+" min @ threshold feel (3 min easy between)","10 min cool-down spin","Target cadence: 88-95 rpm"],
    rpe:isDeload?4:7};
  const tueSw={slot:"PM",time:"19:00",type:"swim",preRun:false,
    title:"Steady Swim",duration:isDeload?"30 min":"45 min",
    paceKeys:[],cooldown:"swim",mobility:null,
    details:isDeload?["400m easy mixed stroke","Focus on breathing"]
      :["400m warm-up",swimDist+" freestyle @ 70% effort, 30s rest","200m cool-down","Cue: high elbow catch, long glide"],
    rpe:isDeload?3:6};
  const wedRun={slot:"AM",time:"06:30",type:"run",preRun:true,
    title:isDeload?"Easy Run":"Tempo Run",duration:isDeload?"30 min":"45 min",
    paceKeys:isDeload?["easy"]:["easy","tempo"],cooldown:isDeload?"easy":"tempo",mobility:"postRun",
    details:isDeload?["30 min easy @ 6:00-6:20/km"]
      :["Warm-up: 10 min @ 6:00-6:20/km","Main: "+tempoMin+" min @ 5:05-5:15/km"+adjTmp,"Cool-down: 10 min @ 6:00-6:20/km","Cue: tall posture, forward lean, glutes firing","If it feels hard, you're on pace"],

// ── SLIDER COMPONENT ───────────────────────────────────────────────
function Slider({value,onChange,min=1,max=5,color="#E8FF47",labels}){
  const pct=((value-min)/(max-min))*100;
  return(
    <div>
      <input type="range" min={min} max={max} value={value} onChange={e=>onChange(Number(e.target.value))}
        style={{"--thumb-color":color}}
      />
      <style>{`input[type=range]::-webkit-slider-thumb{background:${color}} input[type=range]::-moz-range-thumb{background:${color}}`}</style>
      {labels&&<div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        {labels.map((l,i)=><span key={i} style={{fontSize:9,color:i===value-min?color:"#444",fontFamily:"'DM Mono',monospace",letterSpacing:1}}>{l}</span>)}
      </div>}
    </div>
  );
}


// ── CALENDAR SETUP MODAL ──────────────────────────────────────────
function CalendarSetupModal({onSave}){
  const today=new Date();
  const day=today.getDay();
  const daysToMon=day===0?1:day===1?0:8-day;
  const defaultMon=addDays(today,daysToMon);
  const[selDate,setSelDate]=useState(defaultMon);
  const[calMonth,setCalMonth]=useState(new Date(defaultMon.getFullYear(),defaultMon.getMonth(),1));
  const daysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
  const firstDow=(y,m)=>(new Date(y,m,1).getDay()+6)%7;
  const y=calMonth.getFullYear(),m=calMonth.getMonth();
  const totalDays=daysInMonth(y,m);
  const startDow=firstDow(y,m);
  const cells=[];
  for(let i=0;i<startDow;i++)cells.push(null);
  for(let d=1;d<=totalDays;d++)cells.push(new Date(y,m,d));
  const isSel=d=>d&&d.toDateString()===selDate.toDateString();
  const isMon=d=>d&&d.getDay()===1;
  const monthName=calMonth.toLocaleDateString("en-GB",{month:"long",year:"numeric"});
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:360,background:"#111",borderRadius:16,padding:24,animation:"slideIn 0.3s ease"}}>
        <div style={{fontFamily:"'Pirata One',cursive",fontSize:26,letterSpacing:2,marginBottom:4}}>Start Date</div>
        <div style={{fontSize:10,color:"#555",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:20}}>SELECT THE MONDAY WEEK 1 BEGINS</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <button onClick={()=>setCalMonth(d=>new Date(d.getFullYear(),d.getMonth()-1,1))} style={{background:"#1e1e1e",border:"1px solid #2a2a2a",borderRadius:6,color:"#888",cursor:"pointer",padding:"6px 14px",fontFamily:"'DM Mono',monospace",fontSize:16}}>‹</button>
          <span style={{fontFamily:"'Pirata One',cursive",fontSize:16,color:"#f0f0f0",letterSpacing:1}}>{monthName}</span>
          <button onClick={()=>setCalMonth(d=>new Date(d.getFullYear(),d.getMonth()+1,1))} style={{background:"#1e1e1e",border:"1px solid #2a2a2a",borderRadius:6,color:"#888",cursor:"pointer",padding:"6px 14px",fontFamily:"'DM Mono',monospace",fontSize:16}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {["M","T","W","T","F","S","S"].map((d,i)=>(
            <div key={i} style={{textAlign:"center",fontSize:9,color:"#444",fontFamily:"'DM Mono',monospace",padding:"4px 0"}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:20}}>
          {cells.map((d,i)=>{
            const sel=isSel(d),mon=isMon(d);
            return(
              <button key={i} onClick={()=>mon&&d&&setSelDate(d)} disabled={!mon||!d} style={{
                aspectRatio:"1",borderRadius:8,border:"none",
                background:sel?"#E8FF47":mon&&d?"#1e1e1e":"transparent",
                color:sel?"#080808":mon&&d?"#f0f0f0":d?"#2a2a2a":"transparent",
                cursor:mon&&d?"pointer":"default",
                fontFamily:"'DM Mono',monospace",fontSize:13,
                outline:mon&&d&&!sel?"1px solid #2a2a2a":"none",
                fontWeight:sel?"600":"400",transition:"all 0.15s",
              }}>{d?d.getDate():""}</button>
            );
          })}
        </div>
        {selDate&&<div style={{background:"#E8FF4715",border:"1px solid #E8FF4730",borderRadius:8,padding:"10px 14px",marginBottom:16}}>
          <div style={{fontSize:9,color:"#E8FF47",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:3}}>WEEK 1 STARTS</div>
          <div style={{fontFamily:"'Pirata One',cursive",fontSize:18,color:"#f0f0f0",letterSpacing:1}}>
            Monday {selDate.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}
          </div>
          <div style={{fontSize:10,color:"#555",fontFamily:"'DM Mono',monospace",marginTop:3}}>
            Plan ends: {addDays(selDate,83).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}
          </div>
        </div>}
        <button onClick={()=>onSave(selDate.toISOString())} style={{width:"100%",padding:"14px 0",background:"#E8FF47",border:"none",borderRadius:8,color:"#080808",cursor:"pointer",fontFamily:"'Pirata One',cursive",fontSize:18,letterSpacing:2}}>
          START THE PLAN
        </button>
      </div>
    </div>
  );
}

  const hasWarning=injuredZones.some(z=>{const m={"Left hamstring":["run","gym"],"Right hamstring":["run","gym"],"Left calf":["run"],"Right calf":["run"],"Left knee":["run","gym"],"Right knee":["run","gym"],"Lower back":["gym","run"],"Hip flexor":["run","gym"],"Achilles":["run"],"Shoulder":["gym","swim"]};return m[z]&&m[z].includes(s.type);});
  const handleToggle=()=>{setTickAnim(true);setTimeout(()=>setTickAnim(false),400);onToggle(sessionKey);};

    <div style={{background:cardBg,borderRadius:10,marginBottom:8,borderLeft:`3px solid ${borderCol}`,transition:"all 0.25s",opacity:checked||isMissed?0.85:1}}>

              {s.time&&s.time!=="-"&&s.time!=="—"&&<span style={{fontSize:9,color:"#777",fontFamily:"'DM Mono',monospace"}}>{s.time}</span>}
              <span style={{fontSize:9,color:"#555",fontFamily:"'DM Mono',monospace"}}>{s.duration}</span>
              {isMissed&&<span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#FF4747",background:"#FF474718",padding:"2px 7px",borderRadius:3}}>MISSED</span>}
              {hasWarning&&!checked&&!isMissed&&<span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#FFB347",background:"#FFB34720",padding:"2px 7px",borderRadius:3}}>⚠️ INJURY</span>}
            </div>
            <div style={{fontFamily:"'Pirata One',cursive",fontSize:19,letterSpacing:1,color:checked?"#47FFB8":isMissed?"#FF6666":"#f0f0f0",textDecoration:isMissed||checked?"line-through":"none"}}>{cfg.icon} {s.title}</div>
          </div>
          <div style={{display:"flex",gap:5,marginLeft:10,flexShrink:0,alignItems:"center"}}>
            {!checked&&!isMissed&&<span style={{fontSize:10,color:"#2a2a2a"}}>{collapsed?"▼":"▲"}</span>}
            <button onClick={e=>{e.stopPropagation();handleToggle();}} style={{width:32,height:32,borderRadius:7,border:`2px solid ${checked?"#47FFB8":"#2a2a2a"}`,background:checked?"#47FFB825":"#1a1a1a",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",animation:tickAnim?"tickBounce 0.4s ease":"none",fontSize:15}}>
              <span style={{color:checked?"#47FFB8":"#444"}}>✓</span>
            </button>
            <button onClick={e=>{e.stopPropagation();onMiss(sessionKey);}} style={{width:32,height:32,borderRadius:7,border:`2px solid ${isMissed?"#FF4747":"#2a2a2a"}`,background:isMissed?"#FF474725":"#1a1a1a",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",fontSize:15}}>
              <span style={{color:isMissed?"#FF4747":"#444"}}>✕</span>
            </button>
          </div>
        </div>
      </div>
      {!collapsed&&(
        <div style={{padding:"0 14px 14px"}}>
          {hasWarning&&<div style={{background:"#FFB34715",border:"1px solid #FFB34730",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
            <div style={{fontSize:9,color:"#FFB347",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:3}}>INJURY ADVISORY</div>
            <div style={{fontSize:11,color:"#888",fontFamily:"'DM Mono',monospace",lineHeight:1.5}}>You have a flagged niggle that may affect this session. Consider reducing intensity. One modified session beats three missed ones.</div>
          </div>}
          {s.longRunData&&(
            <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
              <div style={{background:"#47FFB815",border:"1px solid #47FFB830",borderRadius:6,padding:"4px 10px",display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:9,color:"#47FFB8",fontFamily:"'DM Mono',monospace"}}>TIME</span><span style={{fontFamily:"'Pirata One',cursive",fontSize:16,color:"#47FFB8"}}>{s.longRunData.mins} min</span></div>
              <div style={{background:"#E8FF4715",border:"1px solid #E8FF4730",borderRadius:6,padding:"4px 10px",display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:9,color:"#E8FF47",fontFamily:"'DM Mono',monospace"}}>DIST</span><span style={{fontFamily:"'Pirata One',cursive",fontSize:16,color:"#E8FF47"}}>~{s.longRunData.km}km</span></div>
            </div>
          )}
          {s.paceKeys&&s.paceKeys.length>0&&(
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
              {s.paceKeys.map(k=>{const p=PACES[k];if(!p)return null;return(
                <span key={k} style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:10,fontFamily:"'DM Mono',monospace",background:`${p.color}22`,border:`1px solid ${p.color}50`,borderRadius:4,padding:"2px 7px",whiteSpace:"nowrap"}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:p.color,flexShrink:0}}/><span style={{color:p.color,letterSpacing:0.5}}>{p.pace}</span><span style={{color:"#666",letterSpacing:1,fontSize:9}}>{p.label.toUpperCase()}</span>
                </span>
              );})}

          )}
          <ul style={{margin:"0 0 8px",padding:0,listStyle:"none"}}>
            {s.details.map((d,i)=>(<li key={i} style={{fontSize:11,color:"#888",fontFamily:"'DM Mono',monospace",padding:"3px 0",borderBottom:i<s.details.length-1?"1px solid #1e1e1e":"none",lineHeight:1.6}}><span style={{color:cfg.color,marginRight:5}}>›</span>{d}</li>))}
          </ul>
          <div style={{display:"flex",gap:3,alignItems:"center",marginTop:6,marginBottom:8}}>

            <span style={{fontSize:9,color:"#555",marginLeft:3,fontFamily:"'DM Mono',monospace"}}>{s.rpe}/10</span>
          </div>
          {s.preRun&&<MobilityPanel type="preRun" title="PRE-RUN" color={cfg.color}/>}
          {s.cooldown&&<CooldownPanel type={s.cooldown} color={cfg.color}/>}
          {s.mobility&&<MobilityPanel type={s.mobility} title={s.type==="gym"?"POST-GYM MOBILITY":"POST-RUN MOBILITY"} color={cfg.color}/>}
          <div style={{display:"flex",gap:8,marginTop:10,alignItems:"center"}}>
            <button onClick={onLog} style={{flex:1,padding:"8px 0",background:logData?"#47FFB815":"#1a1a1a",border:`1px solid ${logData?"#47FFB840":"#2a2a2a"}`,borderRadius:6,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10,color:logData?"#47FFB8":"#666",letterSpacing:1}}>
              {logData?"✓ LOGGED — TAP TO EDIT":"📝 LOG THIS SESSION"}
            </button>
            {logData&&<div style={{fontSize:11}}>{["","😖","😤","😐","😊","🤩"][logData.feel]}{logData.weather?" "+logData.weather.split(" ")[0]:""}</div>}
          </div>
          {logData?.pace&&<div style={{fontSize:10,color:"#777",fontFamily:"'DM Mono',monospace",marginTop:4}}>Pace: {logData.pace}</div>}
          {logData?.notes&&<div style={{fontSize:10,color:"#555",fontFamily:"'DM Mono',monospace",marginTop:2,lineHeight:1.5}}>"{logData.notes}"</div>}
        </div>
      )}
      {collapsed&&logData&&(
        <div style={{padding:"0 14px 10px",display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:10,color:"#47FFB8",fontFamily:"'DM Mono',monospace"}}>✓ Logged</span>
          {logData.pace&&<span style={{fontSize:10,color:"#555",fontFamily:"'DM Mono',monospace"}}>· {logData.pace}</span>}
          {logData.weather&&<span style={{fontSize:12}}>{logData.weather.split(" ")[0]}</span>}
          <button onClick={e=>{e.stopPropagation();onLog();}} style={{marginLeft:"auto",fontSize:9,color:"#444",background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>edit</button>
        </div>
      )}
    </div>
  );
}

// ── STATS TAB ─────────────────────────────────────────────────────
function StatsTab({sessionLogs,fiveKTimes,setFiveKTimes}){
  const[paceInput,setPaceInput]=useState("");
  const[paceResult,setPaceResult]=useState(null);
  const[newTime,setNewTime]=useState("");
  const[newWk,setNewWk]=useState(1);

  const prs=React.useMemo(()=>{
    let fastest=null;
    const heaviest={};
    Object.values(sessionLogs).forEach(log=>{
      if(log.pace){const s=paceToSecs(log.pace);if(s&&(!fastest||s<fastest))fastest=s;}
      if(log.weights){Object.entries(log.weights).forEach(([ex,val])=>{const kg=parseFloat(val);if(!isNaN(kg)&&(!heaviest[ex]||kg>heaviest[ex]))heaviest[ex]=kg;});}
    });
    return{fastest,heaviest};
  },[sessionLogs]);

  const calcPace=()=>{
    const s=paceToSecs(paceInput);
    if(!s){setPaceResult({error:"Enter pace as m:ss e.g. 4:28"});return;}
    const lo=paceToSecs("4:25"),hi=paceToSecs("4:30");
    const mid=(lo+hi)/2;
    const status=s<=lo?"ahead":s<=hi?"on target":"behind";
    const diff=Math.abs(Math.round(s-mid));
    const nextPace=status==="ahead"?secsToStr(Math.max(s-3,lo-5)):status==="behind"?secsToStr(s-2):secsToStr(lo);
    setPaceResult({status,diff,pace:secsToStr(s),nextPace,color:status==="ahead"?"#47FFB8":status==="on target"?"#E8FF47":"#FF6B47"});
  };

  const addTime=()=>{
    if(!newTime)return;
    const existing=fiveKTimes.find(t=>t.week===newWk);
    let updated=existing?fiveKTimes.map(t=>t.week===newWk?{...t,time:newTime}:t):[...fiveKTimes,{week:newWk,time:newTime}].sort((a,b)=>a.week-b.week);
    setFiveKTimes(updated);
    try{localStorage.setItem("sc_5ktimes",JSON.stringify(updated))}catch{}
    setNewTime("");
    setPaceResult(null);
  };

  const sortedTimes=fiveKTimes.slice().sort((a,b)=>a.week-b.week);
  const target=23*60;
  const allSecs=sortedTimes.map(t=>paceToSecs(t.time)||target);
  const maxS=Math.max(...allSecs,target+60);
  const minS=Math.min(...allSecs,target-60);

  return(
    <div style={{padding:"16px 20px 0"}}>
      <div style={{fontFamily:"'Pirata One',cursive",fontSize:28,letterSpacing:2,marginBottom:14}}>Stats</div>

      {/* Pace Calculator */}
      <div style={{background:"#141414",borderRadius:10,padding:"14px",marginBottom:16}}>
        <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:3,color:"#E8FF47",marginBottom:10}}>PACE CALCULATOR</div>
        <div style={{fontSize:10,color:"#555",fontFamily:"'DM Mono',monospace",lineHeight:1.6,marginBottom:10}}>Enter your actual 400m rep pace to see if you're on target and what to aim for next session.</div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input type="text" placeholder="e.g. 4:28" value={paceInput} onChange={e=>setPaceInput(e.target.value)} style={{flex:1}}/>
          <button onClick={calcPace} style={{padding:"8px 14px",background:"#E8FF4720",border:"1px solid #E8FF4740",borderRadius:6,color:"#E8FF47",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>CHECK</button>
        </div>
        {paceResult&&!paceResult.error&&(
          <div style={{background:`${paceResult.color}12`,border:`1px solid ${paceResult.color}30`,borderRadius:8,padding:"12px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontFamily:"'Pirata One',cursive",fontSize:20,color:paceResult.color}}>{paceResult.pace}/km</span>
              <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:paceResult.color,background:`${paceResult.color}20`,padding:"3px 8px",borderRadius:4,letterSpacing:1}}>{paceResult.status.toUpperCase()}</span>
            </div>
            <div style={{fontSize:11,color:"#777",fontFamily:"'DM Mono',monospace",lineHeight:1.6}}>
              {paceResult.status==="on target"?"Right on target — hold this intensity next session.":paceResult.status==="ahead"?`${paceResult.diff}s/km ahead — you can push harder. Next session aim for ${paceResult.nextPace}/km.`:`${paceResult.diff}s/km behind — focus on relaxed form. Try ${paceResult.nextPace}/km next session.`}
            </div>
          </div>
        )}
        {paceResult?.error&&<div style={{fontSize:11,color:"#FF4747",fontFamily:"'DM Mono',monospace"}}>{paceResult.error}</div>}
      </div>

      {/* 5K Progress */}
      <div style={{background:"#141414",borderRadius:10,padding:"14px",marginBottom:16}}>
        <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:3,color:"#FF6B47",marginBottom:12}}>5K PROGRESS GRAPH</div>
        <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
          <input type="text" placeholder="mm:ss e.g. 22:45" value={newTime} onChange={e=>setNewTime(e.target.value)} style={{flex:1,minWidth:100}}/>
          <select value={newWk} onChange={e=>setNewWk(Number(e.target.value))} style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:6,color:"#f0f0f0",fontFamily:"'DM Mono',monospace",fontSize:12,padding:"8px 10px",outline:"none"}}>
            {Array.from({length:12},(_,i)=><option key={i+1} value={i+1}>Week {i+1}</option>)}
          </select>
          <button onClick={addTime} style={{padding:"8px 12px",background:"#FF6B4720",border:"1px solid #FF6B4740",borderRadius:6,color:"#FF6B47",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>ADD</button>
        </div>
        {sortedTimes.length===0?(
          <div style={{textAlign:"center",padding:"20px 0",color:"#2a2a2a",fontFamily:"'DM Mono',monospace",fontSize:11}}>Log time trials to see your progress</div>
        ):(
          <div>
            <svg width="100%" height="130" viewBox="0 0 300 130" preserveAspectRatio="none" style={{overflow:"visible"}}>
              {/* Target line */}
              {(()=>{const ty=110-((target-minS)/(maxS-minS+1))*90;return<line x1="0" y1={Math.max(10,ty)} x2="300" y2={Math.max(10,ty)} stroke="#FF6B47" strokeWidth="1" strokeDasharray="5,4" opacity="0.5"/>;})}
              {/* Bars */}
              {sortedTimes.map((t,i)=>{
                const s=paceToSecs(t.time)||target;
                const barH=Math.max(8,((maxS-s)/(maxS-minS+1))*90);
                const x=sortedTimes.length===1?150:(i/(sortedTimes.length-1))*260+20;
                const col=s<=target?"#47FFB8":"#FF6B47";
                return<g key={i}>
                  <rect x={x-10} y={110-barH} width={20} height={barH} fill={col} opacity={0.65} rx="2"/>
                  <text x={x} y={125} textAnchor="middle" fill="#555" fontSize="8" fontFamily="DM Mono,monospace">W{t.week}</text>
                  <text x={x} y={110-barH-5} textAnchor="middle" fill={col} fontSize="8" fontFamily="DM Mono,monospace">{t.time}</text>
                </g>;
              })}
            </svg>
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
              <span style={{fontSize:9,color:"#FF6B47",fontFamily:"'DM Mono',monospace"}}>— 23:00 target</span>
            </div>
          </div>
        )}
      </div>

      {/* Personal Records */}
      <div style={{background:"#141414",borderRadius:10,padding:"14px",marginBottom:16}}>
        <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:3,color:"#FFB347",marginBottom:12}}>🏆 PERSONAL RECORDS</div>
        <div style={{padding:"8px 0",borderBottom:"1px solid #1e1e1e"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontSize:9,color:"#555",fontFamily:"'DM Mono',monospace",letterSpacing:2}}>FASTEST PACE LOGGED</div>
            <div style={{fontFamily:"'Pirata One',cursive",fontSize:22,color:"#FFB347",marginTop:2}}>{prs.fastest?secsToStr(prs.fastest)+"/km":"—"}</div></div>
            <span style={{fontSize:22}}>⚡</span>
          </div>
        </div>
        {Object.entries(prs.heaviest).slice(0,5).map(([ex,kg])=>(
          <div key={ex} style={{padding:"8px 0",borderBottom:"1px solid #1e1e1e"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:9,color:"#555",fontFamily:"'DM Mono',monospace",letterSpacing:2}}>{ex.toUpperCase()}</div>
              <div style={{fontFamily:"'Pirata One',cursive",fontSize:20,color:"#FF6B47",marginTop:2}}>{kg}kg</div></div>
              <span style={{fontSize:20}}>💪</span>
            </div>
          </div>
        ))}
        {!prs.fastest&&Object.keys(prs.heaviest).length===0&&<div style={{fontSize:11,color:"#2a2a2a",fontFamily:"'DM Mono',monospace",textAlign:"center",padding:"8px 0"}}>Log sessions to start building your records</div>}
      </div>
    </div>
  );
}

// ── RACE DAY TAB ───────────────────────────────────────────────────
function RaceDayTab(){
  const[checks,setChecks]=useState(()=>{try{const s=localStorage.getItem("sc_racechecks");return s?JSON.parse(s):{}}catch{return{}}});
  useEffect(()=>{try{localStorage.setItem("sc_racechecks",JSON.stringify(checks))}catch{}},[checks]);
  const toggle=key=>setChecks(p=>({...p,[key]:!p[key]}));
  const total=RACE_CHECKLIST.reduce((a,s)=>a+s.items.length,0);
  const done=Object.values(checks).filter(Boolean).length;
  return(
    <div style={{padding:"16px 20px 0"}}>
      <div style={{fontFamily:"'Pirata One',cursive",fontSize:28,letterSpacing:2,marginBottom:4}}>Race Day</div>
      <div style={{fontSize:9,color:"#666",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:14}}>WEEK 12 · 5K TIME TRIAL PREP</div>
      <div style={{background:"#141414",borderRadius:8,padding:"12px 14px",marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:9,color:"#666",fontFamily:"'DM Mono',monospace",letterSpacing:2}}>CHECKLIST PROGRESS</span>
          <span style={{fontFamily:"'Pirata One',cursive",fontSize:18,color:done===total?"#47FFB8":"#FF6B47"}}>{done}/{total}</span>
        </div>
        <div style={{height:6,background:"#222",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${(done/total)*100}%`,background:done===total?"#47FFB8":"#FF6B47",borderRadius:3,transition:"width 0.3s"}}/>
        </div>
      </div>
      {RACE_CHECKLIST.map((section,si)=>(
        <div key={si} style={{marginBottom:16}}>
          <div style={{fontSize:9,color:"#FF6B47",fontFamily:"'DM Mono',monospace",letterSpacing:3,marginBottom:8}}>{section.section}</div>
          <div style={{background:"#141414",borderRadius:8,overflow:"hidden"}}>
            {section.items.map((item,ii)=>{
              const key=`${si}-${ii}`;
              const done2=checks[key];
              return(
                <button key={ii} onClick={()=>toggle(key)} style={{display:"flex",alignItems:"center",gap:12,width:"100%",padding:"11px 14px",background:"none",border:"none",borderBottom:ii<section.items.length-1?"1px solid #1e1e1e":"none",cursor:"pointer",textAlign:"left"}}>
                  <div style={{width:22,height:22,borderRadius:5,border:`2px solid ${done2?"#47FFB8":"#333"}`,background:done2?"#47FFB820":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {done2&&<span style={{color:"#47FFB8",fontSize:12}}>✓</span>}
                  </div>
                  <span style={{fontSize:12,color:done2?"#47FFB8":"#bbb",fontFamily:"'DM Mono',monospace",lineHeight:1.5,textDecoration:done2?"line-through":"none"}}>{item}</span>
                </button>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── POST PLAN TAB ──────────────────────────────────────────────────

  const targets=POST_PLAN_TARGETS[bucket]||POST_PLAN_TARGETS["Sub 23:00"];
  return(
    <div style={{padding:"16px 20px 0"}}>
      <div style={{fontFamily:"'Pirata One',cursive",fontSize:28,letterSpacing:2,marginBottom:4}}>What's Next</div>

            <div style={{fontSize:11,color:"#666",fontFamily:"'DM Mono',monospace",marginTop:4}}>5K Time Trial · Week 12</div>
          </div>
          <div style={{background:"#141414",borderRadius:10,padding:"14px",marginBottom:16}}>
            <div style={{fontSize:9,color:"#E8FF47",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:12}}>YOUR NEW TRAINING PACES</div>
            {[["Easy / Z2",targets.easy,"#47FFB8"],["Tempo",targets.tempo,"#E8FF47"],["400m Reps",targets.reps,"#FF4747"],["10K Pace",targets.tenK,"#FF8C47"]].map(([lbl,val,col])=>(
              <div key={lbl} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #1e1e1e"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:col}}/>
                  <span style={{fontSize:12,color:"#bbb",fontFamily:"'Barlow',sans-serif"}}>{lbl}</span>
                </div>
                <span style={{fontSize:13,fontFamily:"'DM Mono',monospace",color:col}}>{val}/km</span>

            ))}
          </div>
          <div style={{background:"#FF6B4710",border:"1px solid #FF6B4730",borderRadius:10,padding:"14px",marginBottom:16}}>
            <div style={{fontSize:9,color:"#FF6B47",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:6}}>NEXT GOAL</div>
            <div style={{fontFamily:"'Pirata One',cursive",fontSize:22,color:"#FF6B47",letterSpacing:1,marginBottom:6}}>{targets.nextGoal}</div>
            <div style={{fontSize:11,color:"#666",fontFamily:"'DM Mono',monospace",lineHeight:1.7}}>Start a fresh 12-week block with your new paces. Increase interval reps by 1 from week 1. Your aerobic base is built — now we sharpen it further.</div>
          </div>
        </div>
      )}
      <div style={{background:"#141414",borderRadius:10,padding:"14px",marginBottom:16}}>
        <div style={{fontSize:9,color:"#47C8FF",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:10}}>PROGRESSION LADDER</div>
        {Object.entries(POST_PLAN_TARGETS).map(([key,val])=>(
          <div key={key} style={{padding:"8px 0",borderBottom:"1px solid #1e1e1e"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontFamily:"'Pirata One',cursive",fontSize:16,color:"#47C8FF",letterSpacing:1}}>{key}</span>
              <span style={{fontSize:10,color:"#555",fontFamily:"'DM Mono',monospace"}}>→ {val.nextGoal.split(" in")[0]}</span>
            </div>
            <div style={{fontSize:9,color:"#444",fontFamily:"'DM Mono',monospace"}}>Easy: {val.easy} · Tempo: {val.tempo} · Reps: {val.reps}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────
function App(){
  const[week,setWeek]=useState(0);
  const[dayIdx,setDayIdx]=useState(0);
  const[view,setView]=useState("training");
  const[checked,setChecked]=useState(()=>{try{const s=localStorage.getItem("sc_progress");return s?JSON.parse(s):{}}catch{return{}}});
  const[missed,setMissed]=useState(()=>{try{const s=localStorage.getItem("sc_missed");return s?JSON.parse(s):{}}catch{return{}}});
  const[sessionLogs,setSessionLogs]=useState(()=>{try{const s=localStorage.getItem("sc_logs");return s?JSON.parse(s):{}}catch{return{}}});
  const[readiness,setReadiness]=useState(()=>{try{const s=localStorage.getItem("sc_readiness");return s?JSON.parse(s):{}}catch{return{}}});
  const[startDate,setStartDate]=useState(()=>{try{return localStorage.getItem("sc_startdate")||null}catch{return null}});
  const[theme,setTheme]=useState(()=>{try{return localStorage.getItem("sc_theme")||"dark"}catch{return"dark"}});
  const[weekNotes,setWeekNotes]=useState(()=>{try{const s=localStorage.getItem("sc_weeknotes");return s?JSON.parse(s):{}}catch{return{}}});
  const[injuryFlags,setInjuryFlags]=useState(()=>{try{const s=localStorage.getItem("sc_injuries");return s?JSON.parse(s):{}}catch{return{}}});
  const[fiveKTimes,setFiveKTimes]=useState(()=>{try{const s=localStorage.getItem("sc_5ktimes");return s?JSON.parse(s):[]}catch{return[]}});
  const[showInjury,setShowInjury]=useState(false);
  const[toast,setToast]=useState(null);
  const[showReadiness,setShowReadiness]=useState(false);
  const[logModal,setLogModal]=useState(null);
  const toastRef=useRef(null);
  const touchStartX=useRef(null);
  const th=THEMES[theme]||THEMES.dark;

  useEffect(()=>{try{localStorage.setItem("sc_progress",JSON.stringify(checked))}catch{}},[checked]);
  useEffect(()=>{try{localStorage.setItem("sc_missed",JSON.stringify(missed))}catch{}},[missed]);
  useEffect(()=>{try{localStorage.setItem("sc_logs",JSON.stringify(sessionLogs))}catch{}},[sessionLogs]);
  useEffect(()=>{try{localStorage.setItem("sc_readiness",JSON.stringify(readiness))}catch{}},[readiness]);
  useEffect(()=>{try{localStorage.setItem("sc_weeknotes",JSON.stringify(weekNotes))}catch{}},[weekNotes]);
  useEffect(()=>{try{localStorage.setItem("sc_injuries",JSON.stringify(injuryFlags))}catch{}},[injuryFlags]);
  useEffect(()=>{try{localStorage.setItem("sc_theme",theme)}catch{}},[theme]);

  const showToast=msg=>{setToast(msg);clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(null),2400)};
  const handleTouchStart=e=>{if(view==="training")touchStartX.current=e.touches[0].clientX;};
  const handleTouchEnd=e=>{
    if(touchStartX.current===null||view!=="training")return;
    const diff=touchStartX.current-e.changedTouches[0].clientX;
    if(Math.abs(diff)>60){
      if(diff>0)setDayIdx(i=>Math.min(i+1,weekData[week].length-1));
      else setDayIdx(i=>Math.max(i-1,0));
    }
    touchStartX.current=null;
  };
  const toggleSession=key=>{
    setChecked(p=>({...p,[key]:!p[key]}));
    // if marking done, clear any missed flag
    setMissed(p=>{const n={...p};delete n[key];return n;});
  };
  const toggleMissed=key=>{
    setMissed(p=>({...p,[key]:!p[key]}));
    // if marking missed, clear any done flag
    setChecked(p=>{const n={...p};delete n[key];return n;});
  };

  useEffect(()=>{
    const day=weekData[week][dayIdx];
    const allActioned=day.sessions.every((_,si)=>checked[sKey(week,dayIdx,si)]||missed[sKey(week,dayIdx,si)]);
    if(!allActioned)return;
    const ndi=dayIdx+1;
    if(ndi<weekData[week].length){
      const t=setTimeout(()=>{setDayIdx(ndi);showToast(`${day.label} done ✓  →  ${weekData[week][ndi].label}`)},600);
      return()=>clearTimeout(t);
    }else{
      const nwk=week+1;
      if(nwk<12){const t=setTimeout(()=>{if(typeof confetti!=="undefined")confetti({particleCount:100,spread:70,origin:{y:0.4},colors:["#E8FF47","#47FFB8","#47C8FF","#FF6B47"]});setWeek(nwk);setDayIdx(0);showToast(`Week ${week+1} complete! 🏆`)},800);return()=>clearTimeout(t);}
      else showToast("Plan complete! 🏁 Time to race.");
    }
  },[checked,missed]);

  // Streak: consecutive days with all sessions actioned
  const streak=React.useMemo(()=>{
    let s=0;
    outer:for(let w=week;w>=0;w--){
      const days=weekData[w];
      for(let di=days.length-1;di>=0;di--){
        const keys=days[di].sessions.map((_,si)=>sKey(w,di,si));
        if(keys.every(k=>checked[k]||missed[k]))s++;
        else break outer;
      }
    }
    return s;
  },[checked,missed,week]);

  const wkKeys=w=>weekData[w].flatMap((d,di)=>d.sessions.map((_,si)=>sKey(w,di,si)));
  const wkDone=w=>wkKeys(w).filter(k=>checked[k]).length;
  const wkMissed=w=>wkKeys(w).filter(k=>missed[k]).length;
  const wkTotal=w=>wkKeys(w).length;
  const done=Object.values(checked).filter(Boolean).length;
  const missedCount=Object.values(missed).filter(Boolean).length;
  const pct=Math.round((done/TOTAL_SESSIONS)*100);
  const missedPct=Math.round((missedCount/TOTAL_SESSIONS)*100);

  const dayDate=startDate?addDays(new Date(startDate),week*7+dayIdx):null;
  const wkData=weekData[week];
  const dayData=wkData[dayIdx];
  const wkNum=week+1;
  const isDeload=wkNum===4||wkNum===8;
  const isPeak=wkNum===12;
  const phase=phases.find(p=>p.weeks.includes(wkNum));
  const todayKey=`r-${week}-${dayIdx}`;
  const todayReadiness=readiness[todayKey];

  const exportWeek=()=>{
    let txt=`SUPPER CLUB — Week ${wkNum}\n${"=".repeat(28)}\n\n`;
    if(startDate)txt+=`Week of ${addDays(new Date(startDate),week*7).toLocaleDateString("en-GB",{day:"numeric",month:"long"})}\n\n`;
    wkData.forEach((day,di)=>{
      txt+=`${day.label.toUpperCase()}\n`;
      day.sessions.forEach((s,si)=>{
        const k=sKey(week,di,si);
        const status=checked[k]?"✓ DONE":missed[k]?"✗ MISSED":"○ PENDING";
        const log=sessionLogs[`log-${week}-${di}-${si}`];
        txt+=`  ${status} ${s.title}${log?.pace?" ["+log.pace+"]":""}\n`;
      });
      txt+="\n";
    });
    if(weekNotes[week])txt+=`Notes:\n${weekNotes[week]}\n`;
    const blob=new Blob([txt],{type:"text/plain"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`supperclub-week${wkNum}.txt`;a.click();URL.revokeObjectURL(url);
    showToast("Week exported ✓");
  };

  const tabs=[["training","SESSIONS"],["nutrition","NUTRITION"],["paces","PACES"],["stats","STATS"],["overview","OVERVIEW"],["race","RACE DAY"],["next","NEXT STEPS"]];

  if(!startDate){
    return <CalendarSetupModal onSave={d=>{setStartDate(d);try{localStorage.setItem("sc_startdate",d)}catch{}}}/>;
  }

  return(
    <div style={{minHeight:"100vh",background:theme==="amber"?"#080500":"#0a0a0a",color:theme==="amber"?"#f5e6c0":"#f0f0f0",fontFamily:"'Barlow',sans-serif",paddingBottom:60}}
      onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",zIndex:9999,background:"#1a2a1a",border:"1px solid #47FFB860",borderRadius:10,padding:"10px 18px",fontSize:12,fontFamily:"'DM Mono',monospace",color:"#47FFB8",boxShadow:"0 4px 24px rgba(0,0,0,0.7)",whiteSpace:"nowrap",animation:"fadeIn 0.2s ease"}}>{toast}</div>}
      {showReadiness&&<ReadinessModal dateKey={todayKey} existing={todayReadiness} onSave={d=>{setReadiness(p=>({...p,[todayKey]:d}));setShowReadiness(false);showToast("Readiness saved ✓")}} onClose={()=>setShowReadiness(false)}/>}
      {logModal&&<SessionLogModal session={logModal.session} logKey={logModal.key} existing={sessionLogs[logModal.key]} onSave={d=>{setSessionLogs(p=>({...p,[logModal.key]:d}));setLogModal(null);showToast("Session logged ✓")}} onClose={()=>setLogModal(null)}/>}

      {/* INJURY MODAL */}
      {showInjury&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:1000,display:"flex",alignItems:"flex-end"}}>
          <div style={{width:"100%",background:"#111",borderRadius:"16px 16px 0 0",padding:24,animation:"slideIn 0.2s ease"}}>
            <div style={{fontFamily:"'Pirata One',cursive",fontSize:20,letterSpacing:2,color:"#FFB347",marginBottom:4}}>Injury Flags</div>
            <div style={{fontSize:10,color:"#555",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:16}}>SESSIONS WILL SHOW A WARNING FOR FLAGGED AREAS</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
              {INJURY_ZONES.map(z=>{
                const active=injuryFlags[z];
                return(<button key={z} onClick={()=>setInjuryFlags(p=>({...p,[z]:!p[z]}))} style={{padding:"8px 12px",borderRadius:8,border:`1px solid ${active?"#FFB347":"#2a2a2a"}`,background:active?"#FFB34720":"#1a1a1a",color:active?"#FFB347":"#666",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>{active?"⚠️ ":""}{z}</button>);
              })}
            </div>
            <button onClick={()=>setShowInjury(false)} style={{width:"100%",padding:"12px 0",background:"#1e1e1e",border:"1px solid #2a2a2a",borderRadius:8,color:"#888",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>DONE</button>
          </div>
        </div>
      )}

      {/* HEADER */}
      <div style={{background:"#0a0a0a",padding:"44px 20px 14px",borderBottom:"1px solid #1e1e1e"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:3,color:"#555",marginBottom:4}}>12-WEEK ATHLETE PERFORMANCE PLAN</div>
            <h1 style={{fontFamily:"'Pirata One',cursive",fontSize:34,margin:0,lineHeight:1.1,letterSpacing:2}}>
              SUPPER CLUB<br/>
              <span style={{color:phase?.color??"#E8FF47"}}>{isPeak?"TEST YOURSELF.":isDeload?"RECOVER HARDER.":(phase?.label.split("—")[1].trim()??"BUILD")+"."}</span>
            </h1>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
            {/* Readiness */}
            <button onClick={()=>setShowReadiness(true)} style={{background:todayReadiness?`${todayReadiness.avg>=4?"#47FFB8":todayReadiness.avg>=3?"#E8FF47":todayReadiness.avg>=2?"#FFB347":"#FF4747"}15`:"#141414",border:`1px solid ${todayReadiness?todayReadiness.avg>=4?"#47FFB840":todayReadiness.avg>=3?"#E8FF4740":todayReadiness.avg>=2?"#FFB34740":"#FF474740":"#222"}`,borderRadius:10,padding:"7px 10px",cursor:"pointer",textAlign:"center",minWidth:54}}>
              <div style={{fontSize:16}}>{todayReadiness?["😖","😤","😐","😊","🤩"][Math.round(todayReadiness.avg)-1]:"💤"}</div>
              <div style={{fontSize:7,fontFamily:"'DM Mono',monospace",color:"#444",marginTop:2,letterSpacing:1}}>{todayReadiness?`${todayReadiness.avg}/5`:"READY?"}</div>
            </button>
            {/* Theme toggle */}
            <button onClick={()=>setTheme(t=>t==="dark"?"amber":"dark")} style={{background:"#141414",border:"1px solid #222",borderRadius:8,padding:"5px 8px",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:9,color:theme==="amber"?"#ffb000":"#666",letterSpacing:1}}>
              {theme==="amber"?"🌙 DARK":"🟡 AMBER"}
            </button>
          </div>
        </div>

        {/* Streak + date chips */}
        <div style={{display:"flex",gap:8,marginTop:10,marginBottom:4,flexWrap:"wrap"}}>
          {streak>0&&<div style={{background:"#E8FF4712",border:"1px solid #E8FF4730",borderRadius:6,padding:"4px 10px",display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:12}}>🔥</span>
            <span style={{fontFamily:"'Pirata One',cursive",fontSize:14,color:"#E8FF47"}}>{streak} day streak</span>
          </div>}
          {Object.values(injuryFlags).some(Boolean)&&<button onClick={()=>setShowInjury(true)} style={{background:"#FFB34715",border:"1px solid #FFB34730",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10,color:"#FFB347"}}>
            ⚠️ {Object.values(injuryFlags).filter(Boolean).length} niggle{Object.values(injuryFlags).filter(Boolean).length>1?"s":""}
          </button>}
          {dayDate&&<div style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:6,padding:"4px 10px"}}>
            <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:"#555"}}>{fmtDate(dayDate)}</span>
          </div>}
        </div>

        {/* Weekly intention */}
        <div style={{background:"#141414",borderRadius:8,padding:"10px 12px",marginTop:12,borderLeft:`3px solid ${phase?.color??"#E8FF47"}`}}>
          <div style={{fontSize:8,color:"#444",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:3}}>WEEK {wkNum} INTENTION</div>
          <div style={{fontSize:12,color:"#bbb",fontFamily:"'DM Mono',monospace",lineHeight:1.5,fontStyle:"italic"}}>"{INTENTIONS[week]}"</div>
        </div>

        {/* Phase bar */}
        <div style={{display:"flex",gap:0,marginTop:12,borderRadius:6,overflow:"hidden"}}>
          {phases.map(ph=>(
            <div key={ph.label} style={{flex:1,padding:"5px 0 5px 8px",background:ph.weeks.includes(wkNum)?`${ph.color}20`:"#141414",borderBottom:ph.weeks.includes(wkNum)?`2px solid ${ph.color}`:"2px solid #1e1e1e"}}>
              <div style={{fontSize:8,fontFamily:"'DM Mono',monospace",letterSpacing:1,color:ph.weeks.includes(wkNum)?ph.color:"#444"}}>{ph.label.split("—")[1].trim()} {ph.weeks[0]}–{ph.weeks[ph.weeks.length-1]}</div>
            </div>
          ))}
        </div>

        {/* OVERALL PROGRESS */}
        <div style={{marginTop:12,background:"#141414",borderRadius:8,padding:"12px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
            <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:3,color:"#666"}}>OVERALL PROGRESS</span>
            <div style={{display:"flex",gap:10,alignItems:"baseline"}}>
              <span style={{fontFamily:"'Pirata One',cursive",fontSize:20,color:pct===100?"#47FFB8":phase?.color??"#E8FF47",letterSpacing:1}}>{done} / {TOTAL_SESSIONS}</span>
              {missedCount>0&&<span style={{fontFamily:"'Pirata One',cursive",fontSize:13,color:"#FF4747",letterSpacing:1}}>{missedCount} missed</span>}
            </div>
          </div>
          <div style={{height:8,background:"#222",borderRadius:4,overflow:"hidden",position:"relative"}}>
            {phases.map((ph,i)=>{
              const pt=ph.weeks.reduce((a,w)=>a+wkTotal(w-1),0);
              const pd=ph.weeks.reduce((a,w)=>a+wkDone(w-1),0);
              const pm=ph.weeks.reduce((a,w)=>a+wkMissed(w-1),0);
              const off=phases.slice(0,i).reduce((a,p2)=>a+(p2.weeks.reduce((b,w)=>b+wkTotal(w-1),0)/TOTAL_SESSIONS)*100,0);
              const segW=(pt/TOTAL_SESSIONS)*100;
              const donePct=Math.min((pd/pt)*100,100);
              const missPct=Math.min((pm/pt)*100,100-donePct);
              return(<div key={ph.label} style={{position:"absolute",top:0,bottom:0,left:`${off}%`,width:`${segW}%`,background:"#1c1c1c"}}>
                <div style={{position:"absolute",top:0,bottom:0,left:0,width:`${donePct}%`,background:ph.color,borderRadius:4,transition:"width 0.4s"}}/>
                <div style={{position:"absolute",top:0,bottom:0,left:`${donePct}%`,width:`${missPct}%`,background:"#FF4747",opacity:0.75,transition:"width 0.4s"}}/>
              </div>);
            })}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6,flexWrap:"wrap",gap:4}}>
            <div style={{display:"flex",gap:10}}>
              <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#555"}}>{pct}% done</span>
              {missedCount>0&&<span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#FF4747"}}>{missedPct}% missed</span>}
            </div>
            {pct===100&&missedCount===0?<span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#47FFB8"}}>🏁 PLAN COMPLETE</span>:<span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#333"}}>{TOTAL_SESSIONS-done-missedCount} remaining</span>}
          </div>
        </div>
        {(isDeload||isPeak)&&<div style={{marginTop:8,display:"inline-block",fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:2,color:isPeak?"#FF6B47":"#47C8FF",border:`1px solid ${isPeak?"#FF6B4740":"#47C8FF40"}`,padding:"3px 9px",borderRadius:4}}>{isPeak?"🏁 TAPER + 5K TEST — TARGET SUB 23:00":"♻️ DELOAD — 30% VOLUME REDUCTION"}</div>}
      </div>

      {/* WEEK SELECTOR */}
      <div style={{padding:"10px 20px 12px",borderBottom:"1px solid #1e1e1e"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
          <div style={{fontSize:8,fontFamily:"'DM Mono',monospace",letterSpacing:3,color:"#444"}}>SELECT WEEK</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowInjury(true)} style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:Object.values(injuryFlags).some(Boolean)?"#FFB347":"#555",background:"none",border:"none",cursor:"pointer",padding:"2px 4px"}}>⚠️ INJURY</button>
            <button onClick={exportWeek} style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#555",background:"none",border:"none",cursor:"pointer",padding:"2px 4px"}}>↗ EXPORT</button>
          </div>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {Array.from({length:12},(_,i)=>{
            const w=i+1,isA=w===wkNum,dl=w===4||w===8,pk=w===12;
            const ph=phases.find(p=>p.weeks.includes(w));
            const d2=wkDone(i),m2=wkMissed(i),t=wkTotal(i),allActioned=(d2+m2)===t&&t>0,allD=d2===t&&t>0;
            return(<button key={w} onClick={()=>{setWeek(i);setDayIdx(0);}} style={{width:36,height:36,borderRadius:6,border:"none",position:"relative",background:isA?(ph?.color??"#E8FF47"):allD?"#47FFB820":allActioned?"#FF474718":dl?"#47C8FF15":pk?"#FF6B4715":"#141414",color:isA?"#080808":allD?"#47FFB8":allActioned?"#FF8888":dl?"#47C8FF":pk?"#FF6B47":"#777",cursor:"pointer",fontFamily:"'Pirata One',cursive",fontSize:15,outline:isA?"none":allD?"1px solid #47FFB850":allActioned?"1px solid #FF474740":"1px solid #222",transition:"all 0.15s"}}>
              {w}
              {allD&&!isA&&<div style={{position:"absolute",top:2,right:2,width:6,height:6,borderRadius:"50%",background:"#47FFB8"}}/>}
              {!allD&&m2>0&&!isA&&<div style={{position:"absolute",top:2,right:2,width:6,height:6,borderRadius:"50%",background:"#FF4747"}}/>}
            </button>);
          })}
        </div>
        <div style={{marginTop:8,fontSize:10,color:"#555",fontFamily:"'DM Mono',monospace",lineHeight:1.5}}>
          {phase?.desc}&nbsp;·&nbsp;<span style={{color:wkDone(week)===wkTotal(week)&&wkTotal(week)>0?"#47FFB8":wkMissed(week)>0?"#FF8888":"#555"}}>Week {wkNum}: {wkDone(week)}/{wkTotal(week)} done{wkMissed(week)>0?` · ${wkMissed(week)} missed`:""}</span>
        </div>
      </div>

                  {note?<div style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#444",marginTop:5,lineHeight:1.4,fontStyle:"italic"}}>"{note.slice(0,70)}{note.length>70?"...":""}"</div>
                  :<div style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#333",marginTop:5}}>
                    {dl?"Volume -30% · Easy paces · Full recovery":pk?"Taper · Tune-up Fri · Shakeout Sat · 5K Sun":w<=3?"400m @ 4:25-4:30 · Tempo 5:05-5:15 · Long 75 min":w<=7?"400m @ 4:22-4:27 · Tempo 5:05-5:10 · Long 90 min":"400m @ 4:18-4:23 · Tempo 5:00-5:05 · Long 100 min"}
                  </div>}
                </button>);
              })}
            </div>
          ))}
        </div>
      )}

      {view==="stats"&&<StatsTab sessionLogs={sessionLogs} fiveKTimes={fiveKTimes} setFiveKTimes={setFiveKTimes}/>}
      {view==="race"&&<RaceDayTab/>}
      {view==="next"&&<PostPlanTab/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
