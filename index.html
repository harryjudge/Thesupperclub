function getPostPlanBucket(timeStr, goal){
  if(!timeStr) return null;
  const parts=timeStr.split(":").map(Number);
  let secs=0;
  if(parts.length===3) secs=parts[0]*3600+parts[1]*60+parts[2];
  else if(parts.length===2) secs=parts[0]*60+parts[1];
  const buckets=Object.keys(POST_PLAN_TARGETS[goal]||POST_PLAN_TARGETS["5K"]);
  // Find first bucket the time beats
  for(const b of buckets){
    const [h,m,s]=b.replace("Sub ","").split(":").map(Number);
    const bSecs=s!=null?h*3600+m*60+s:h*60+m;
    if(secs<bSecs) return b;
  }
  return buckets[buckets.length-1];
}

function weights(p,isDeload){
  const s=isDeload?0.85:p===1?1:p===2?1.07:1.14;
  const r=(base)=>`${Math.round((base*s)/2.5)*2.5}kg`;
  return{
    trapDL:r(60),splitSquat:r(35),hipThrust:r(62),stepUp:r(22),
    powerClean:r(42),pullUp:p===1?"BW":"BW +5kg",dbRow:r(22),
    landmine:r(25),farmerCarry:r(28),
    nordics:"Bodyweight — control the descent",copHold:"Bodyweight",
    pallof:p===1?"10kg band/cable":p===2?"12.5kg":"15kg",
  };
}

// ── DYNAMIC DETAIL GENERATOR ───────────────────────────────────────
// Replaces hardcoded pace strings in session details with slider-computed values
function applyPacesToDetails(details, paces){
  if(!details||!paces)return details;
  const replacements=[
    [/4:25[-–]4:30\/km/g,  ()=>paces.reps400.pace],
    [/4:22[-–]4:27\/km/g,  ()=>paces.reps400.pace],
    [/4:18[-–]4:23\/km/g,  ()=>paces.reps400.pace],
    [/4:25[-–]4:30/g,      ()=>paces.reps400.pace.replace("/km","")],
    [/4:45\/km/g,          ()=>paces.tenK.pace],
    [/4:42\/km/g,          ()=>paces.tenK.pace],
    [/4:38\/km/g,          ()=>paces.tenK.pace],
    [/4:33[-–]4:38\/km/g,  ()=>paces.fiveK.pace],
    [/5:05[-–]5:15\/km/g,  ()=>paces.tempo.pace],
    [/5:05[-–]5:10\/km/g,  ()=>paces.tempo.pace],
    [/5:00[-–]5:05\/km/g,  ()=>paces.tempo.pace],
    [/6:00[-–]6:20\/km/g,  ()=>paces.easy.pace],
    [/6:00[-–]6:20/g,      ()=>paces.easy.pace.replace("/km","")],
    [/5:25[-–]5:30\/km/g,  ()=>paces.marathon.pace],
    [/4:53\/km/g,          ()=>paces.hmPace.pace],
  ];
  return details.map(d=>{
    let s=d;
    replacements.forEach(([re,fn])=>{s=s.replace(re,fn());});
    return s;
  });
}

// Scale nutrition macros by body weight (reference: 76kg)
function scaleNutrition(meals, bw=76){
  const factor=bw/76;
  return meals.map(m=>({
    ...m,
    pro:Math.round(m.pro*factor),
    carb:Math.round(m.carb*factor),
    fat:Math.round(m.fat*factor),
  }));
}

// ── PACE DERIVATION FROM RACE TIME ──────────────────────────────────
// Given a recent race time string "mm:ss" or "h:mm:ss" for a given distance,
// back-calculate equivalent easy pace using vDot-style factors
function raceTimeToEasySecs(timeStr, distanceKm){
  if(!timeStr||!distanceKm)return 360; // default 6:00/km
  const parts=timeStr.split(":").map(Number);
  let totalSecs=0;
  if(parts.length===3) totalSecs=parts[0]*3600+parts[1]*60+parts[2];
  else if(parts.length===2) totalSecs=parts[0]*60+parts[1];
  else return 360;
  const racePaceSecsPerKm=totalSecs/distanceKm;
  // Easy pace is roughly 1.35-1.40x race pace for 5K-10K, more for marathon
  const factors={"5K":1.38,"10K":1.35,"HM":1.32,"FM":1.28};
  // we'll just use distance to pick factor
  let factor=1.35;
  if(distanceKm<=5.5)factor=1.38;
  else if(distanceKm<=10.5)factor=1.35;
  else if(distanceKm<=21.5)factor=1.32;
  else factor=1.28;
  return Math.round(racePaceSecsPerKm*factor);
}

const GOAL_DISTANCES={"5K":5,"10K":10,"HM":21.1,"FM":42.2};

// ── PHASE LOGIC (goal-aware) ─────────────────────────────────────────
function wkPhase(wk, goal="5K"){
  const cfg=GOAL_CONFIGS[goal]||GOAL_CONFIGS["5K"];
  // Maintenance: no taper or race, just consistent build/maintain cycles
  if(goal==="MAINTENANCE"){
    if(wk===4||wk===8||wk===12)return"deload";
    if(wk<=3)return"base";
    if(wk<=7)return"build";
    return"sharpen";
  }
  const tw=cfg.taperWeeks;
  if(wk<=3)return"base";
  if(wk===4)return"deload";
  if(wk<=7)return"build";
  if(wk===8)return"deload";
  const remaining=12-wk;
  if(remaining===0)return"race";
  if(remaining<tw)return"taper";
  return"sharpen";
}

// ── DYNAMIC PACE COMPUTATION ─────────────────────────────────────────
function computePaces(easySecsPerKm){
  const e=easySecsPerKm;
  const tempo   =Math.round(e*0.855);
  const hmPace  =Math.round(e*0.810);
  const tenK    =Math.round(e*0.790);
  const fiveK   =Math.round(e*0.760);
  const rep400  =Math.round(e*0.738);
  const marathon=Math.round(e*0.905);
  const fmt=(s,r=5)=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}–${Math.floor((s+r)/60)}:${String((s+r)%60).padStart(2,"0")}/km`;
  const f1=(s)=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}/km`;
  return{
    easy:    {label:"Easy / Z2",         pace:fmt(e,20), color:"#47FFB8"},
    longRun: {label:"Long Run",          pace:fmt(e,20), color:"#47FFB8"},
    marathon:{label:"Marathon Pace",     pace:fmt(marathon,10),color:"#47C8FF"},
    tempo:   {label:"Tempo / Threshold", pace:fmt(tempo,10),  color:"#E8FF47"},
    hmPace:  {label:"HM Race Pace",      pace:f1(hmPace),     color:"#FFB347"},
    tenK:    {label:"10K Pace",          pace:f1(tenK),       color:"#FF8C47"},
    fiveK:   {label:"5K Pace",           pace:fmt(fiveK,5),   color:"#FF6B47"},
    reps400: {label:"400m Rep Pace",     pace:fmt(rep400,5),  color:"#FF4747"},
  };
}

const minsToKm=(mins,paceSecs=360)=>Math.round((mins/(paceSecs/60))*10)/10;

  const ph=wkPhase(wk,goal);
  const isDeload=ph==="deload";
  const isTaper=ph==="taper";

function Slider({value,onChange,min=1,max=5,color="#E8FF47",labels}){
  const pct=((value-min)/(max-min))*100;
  return(
    <div>
      <input type="range" min={min} max={max} value={value} onChange={e=>onChange(Number(e.target.value))}
        style={{"--thumb-color":color}}
      />
      <style>{`input[type=range]::-webkit-slider-thumb{background:${color}} input[type=range]::-moz-range-thumb{background:${color}}`}</style>
      {labels&&<div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
        {labels.map((l,i)=><span key={i} style={{fontSize:9,color:i===value-min?color:"#444",fontFamily:"'DM Mono',monospace",letterSpacing:1}}>{l}</span>)}
      </div>}
    </div>
  );
}

                  <button key={key} onClick={()=>setSelectedGoal(key)} style={{
                    display:"flex",alignItems:"center",gap:14,padding:"14px 18px",
                    borderRadius:12,cursor:"pointer",textAlign:"left",

                    border:`2px solid ${isSelected?g.color:"#1e1e1e"}`,
                    transition:"all 0.15s"
                  }}>
                    <span style={{fontSize:24,flexShrink:0}}>{g.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"'Pirata One',cursive",fontSize:20,color:isSelected?g.color:"#f0f0f0",letterSpacing:1}}>{g.label}</div>
                      <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#555",marginTop:2,letterSpacing:1}}>
                        {key==="5K"?"Peak long run ~90 min · Speed-focused":
                         key==="10K"?"Peak long run ~110 min · Balanced":
                         key==="HM"?"Peak long run ~140 min · Tempo-focused":
                         key==="FM"?"Peak long run ~190 min · Endurance-focused":
                         "Consistent fitness · No race goal · Sustainable"}
                      </div>
                    </div>
                    {isSelected&&<span style={{color:g.color,fontSize:18}}>✓</span>}
                  </button>
                );
              })}
            </div>
            <button onClick={()=>setStep(2)} style={{width:"100%",padding:"14px 0",background:`${cfg.color}`,border:"none",borderRadius:10,color:"#080808",cursor:"pointer",fontFamily:"'Pirata One',cursive",fontSize:20,letterSpacing:2}}>
              NEXT →
            </button>
          </>
        )}

        {step===2&&(
          <>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:24}}>
              <button onClick={()=>setStep(1)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:12}}>← back</button>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:20}}>{cfg.icon}</span>
                <span style={{fontFamily:"'Pirata One',cursive",fontSize:20,color:cfg.color,letterSpacing:1}}>{cfg.label}</span>
              </div>
            </div>

            <div style={{fontSize:11,fontFamily:"'DM Mono',monospace",letterSpacing:3,color:"#555",marginBottom:16,textAlign:"center"}}>YOUR CURRENT ABILITY</div>

            {selectedGoal==="MAINTENANCE"?(
              <div style={{background:"#141414",borderRadius:12,padding:"16px",marginBottom:16}}>
                <div style={{fontSize:10,color:"#888",fontFamily:"'DM Mono',monospace",lineHeight:1.7}}>
                  Maintenance mode builds consistent fitness without a specific race target. You'll get 1-2 quality sessions per week, regular long runs up to 90 min, and a sustainable mix of gym and cross-training.
                </div>
                <div style={{marginTop:12,padding:"10px 12px",background:"#aaaaaa15",border:"1px solid #aaaaaa25",borderRadius:8}}>
                  <div style={{fontSize:9,color:"#aaa",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:4}}>NO RACE TARGET</div>
                  <div style={{fontSize:11,color:"#888",fontFamily:"'DM Mono',monospace",lineHeight:1.5}}>Week 12 is a fitness check-in, not a race. Switch to a race goal at any time using Reset.</div>

              </div>
            ):(
              <div style={{background:"#141414",borderRadius:12,padding:"16px",marginBottom:16}}>
                <div style={{fontSize:10,color:"#666",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:8}}>
                  RECENT {selectedGoal} TIME (OPTIONAL)
                </div>
                <input type="text" placeholder={placeholders[selectedGoal]+" ("+examples[selectedGoal]+")"} value={raceTime} onChange={e=>setRaceTime(e.target.value)}

                <div style={{fontSize:10,color:"#444",fontFamily:"'DM Mono',monospace",lineHeight:1.6,marginTop:8}}>
                  Enter a recent race time and paces calculate automatically. Leave blank to use defaults — adjust later in PACES tab.
                </div>
                {raceTime&&(()=>{
                  const easySecs=raceTimeToEasySecs(raceTime,dist);
                  const paces=computePaces(easySecs);
                  if(easySecs<240||easySecs>600)return null;
                  return(
                    <div style={{marginTop:12,padding:"10px 12px",background:`${cfg.color}10`,border:`1px solid ${cfg.color}25`,borderRadius:8}}>
                      <div style={{fontSize:9,color:cfg.color,fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:6}}>YOUR TRAINING PACES</div>
                      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                        {[["Easy",paces.easy.pace,"#47FFB8"],["Tempo",paces.tempo.pace,"#E8FF47"],["Rep",paces.reps400.pace,"#FF4747"]].map(([l,p,col])=>(
                          <div key={l}>
                            <div style={{fontSize:8,color:"#555",fontFamily:"'DM Mono',monospace",letterSpacing:1}}>{l.toUpperCase()}</div>
                            <div style={{fontSize:11,color:col,fontFamily:"'DM Mono',monospace"}}>{p}</div>

            <button onClick={handleContinue} style={{width:"100%",padding:"14px 0",background:selectedGoal==="MAINTENANCE"?"#555":cfg.color,border:"none",borderRadius:10,color:selectedGoal==="MAINTENANCE"?"#f0f0f0":"#080808",cursor:"pointer",fontFamily:"'Pirata One',cursive",fontSize:20,letterSpacing:2,marginBottom:10}}>

    </div>
  );
}

// ── CALENDAR SETUP MODAL ──────────────────────────────────────────
function CalendarSetupModal({onSave}){
  const today=new Date();
  const day=today.getDay();
  const daysToMon=day===0?1:day===1?0:8-day;
  const defaultMon=addDays(today,daysToMon);
  const[selDate,setSelDate]=useState(defaultMon);
  const[calMonth,setCalMonth]=useState(new Date(defaultMon.getFullYear(),defaultMon.getMonth(),1));
  const daysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
  const firstDow=(y,m)=>(new Date(y,m,1).getDay()+6)%7;
  const y=calMonth.getFullYear(),m=calMonth.getMonth();
  const totalDays=daysInMonth(y,m);
  const startDow=firstDow(y,m);
  const cells=[];
  for(let i=0;i<startDow;i++)cells.push(null);
  for(let d=1;d<=totalDays;d++)cells.push(new Date(y,m,d));
  const isSel=d=>d&&d.toDateString()===selDate.toDateString();
  const isMon=d=>d&&d.getDay()===1;
  const monthName=calMonth.toLocaleDateString("en-GB",{month:"long",year:"numeric"});
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:360,background:"var(--bg2)",borderRadius:16,padding:24,animation:"slideIn 0.3s ease"}}>
        <div style={{fontFamily:"'Pirata One',cursive",fontSize:26,letterSpacing:2,marginBottom:4}}>Start Date</div>
        <div style={{fontSize:10,color:"var(--dim)",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:20}}>SELECT THE MONDAY WEEK 1 BEGINS</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <button onClick={()=>setCalMonth(d=>new Date(d.getFullYear(),d.getMonth()-1,1))} style={{background:"var(--border)",border:"1px solid #2a2a2a",borderRadius:6,color:"var(--muted)",cursor:"pointer",padding:"6px 14px",fontFamily:"'DM Mono',monospace",fontSize:16}}>‹</button>
          <span style={{fontFamily:"'Pirata One',cursive",fontSize:16,color:"var(--text)",letterSpacing:1}}>{monthName}</span>
          <button onClick={()=>setCalMonth(d=>new Date(d.getFullYear(),d.getMonth()+1,1))} style={{background:"var(--border)",border:"1px solid #2a2a2a",borderRadius:6,color:"var(--muted)",cursor:"pointer",padding:"6px 14px",fontFamily:"'DM Mono',monospace",fontSize:16}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {["M","T","W","T","F","S","S"].map((d,i)=>(
            <div key={i} style={{textAlign:"center",fontSize:9,color:"#444",fontFamily:"'DM Mono',monospace",padding:"4px 0"}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:20}}>
          {cells.map((d,i)=>{
            const sel=isSel(d),mon=isMon(d);
            return(
              <button key={i} onClick={()=>mon&&d&&setSelDate(d)} disabled={!mon||!d} style={{
                aspectRatio:"1",borderRadius:8,border:"none",
                background:sel?"#E8FF47":mon&&d?"var(--border)":"transparent",
                color:sel?"#080808":mon&&d?"var(--text)":d?"var(--border)":"transparent",
                cursor:mon&&d?"pointer":"default",
                fontFamily:"'DM Mono',monospace",fontSize:13,
                outline:mon&&d&&!sel?"1px solid #2a2a2a":"none",
                fontWeight:sel?"600":"400",transition:"all 0.15s",
              }}>{d?d.getDate():""}</button>
            );
          })}
        </div>
        {selDate&&<div style={{background:"#E8FF4715",border:"1px solid #E8FF4730",borderRadius:8,padding:"10px 14px",marginBottom:16}}>
          <div style={{fontSize:9,color:"#E8FF47",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:3}}>WEEK 1 STARTS</div>
          <div style={{fontFamily:"'Pirata One',cursive",fontSize:18,color:"var(--text)",letterSpacing:1}}>
            Monday {selDate.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}
          </div>
          <div style={{fontSize:10,color:"var(--dim)",fontFamily:"'DM Mono',monospace",marginTop:3}}>
            Plan ends: {addDays(selDate,83).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}
          </div>
        </div>}
        <button onClick={()=>onSave(selDate.toISOString())} style={{width:"100%",padding:"14px 0",background:"#E8FF47",border:"none",borderRadius:8,color:"#080808",cursor:"pointer",fontFamily:"'Pirata One',cursive",fontSize:18,letterSpacing:2}}>
          START THE PLAN
        </button>
      </div>
    </div>
  );
}

// ── SETTINGS MODAL ────────────────────────────────────────────────

  const firstDow=(y,m)=>(new Date(y,m,1).getDay()+6)%7;

        <div style={{marginBottom:20}}>
          <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:3,color:"var(--dim)",marginBottom:8}}>BODY WEIGHT</div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>

            {cells.map((d,i)=>{

                  aspectRatio:"1",borderRadius:6,border:"none",

        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"12px 0",background:"var(--card)",border:`1px solid var(--border)`,borderRadius:8,color:"var(--dim)",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>CANCEL</button>

      </div>

// ── READINESS CHECK MODAL ──────────────────────────────────────────
function ReadinessModal({dateKey,existing,onSave,onClose}){
  const[sleep,setSleep]=useState(existing?.sleep||3);
  const[fatigue,setFatigue]=useState(existing?.fatigue||3);
  const[soreness,setSoreness]=useState(existing?.soreness||3);
  const[mood,setMood]=useState(existing?.mood||3);
  const avg=((sleep+fatigue+soreness+mood)/4).toFixed(1);
  const color=avg>=4?"#47FFB8":avg>=3?"#E8FF47":avg>=2?"#FFB347":"#FF4747";
  const advice=avg>=4?"Green light. Attack today's session.":avg>=3?"Proceed as planned. Stay attentive to how you feel.":avg>=2?"Consider reducing intensity by 15–20%. Don't skip, just dial back.":"Rest day recommended. A skipped session today beats an injury or illness tomorrow.";
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"flex-end"}}>
      <div style={{width:"100%",background:"var(--bg2)",borderRadius:"16px 16px 0 0",padding:24,animation:"slideIn 0.2s ease"}}>
        <div style={{fontFamily:"'Pirata One',cursive",fontSize:22,letterSpacing:2,marginBottom:4}}>Daily Readiness</div>
        <div style={{fontSize:9,color:"var(--dim)",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:20}}>HOW ARE YOU FEELING TODAY?</div>
        {[
          {label:"Sleep Quality",val:sleep,set:setSleep,lo:"Poor",hi:"Great",color:"#47C8FF"},
          {label:"Energy / Fatigue",val:fatigue,set:setFatigue,lo:"Drained",hi:"Energised",color:"#E8FF47"},
          {label:"Muscle Soreness",val:soreness,set:setSoreness,lo:"Very sore",hi:"Fresh",color:"#47FFB8"},
          {label:"Mood / Motivation",val:mood,set:setMood,lo:"Low",hi:"High",color:"#FF6B47"},
        ].map(r=>(
          <div key={r.label} style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:11,color:"#bbb",fontFamily:"'DM Mono',monospace"}}>{r.label}</span>
              <span style={{fontSize:13,fontFamily:"'Pirata One',cursive",color:r.color}}>{r.val}/5</span>
            </div>
            <Slider value={r.val} onChange={r.set} color={r.color} labels={[r.lo,"","","",r.hi]}/>
          </div>
        ))}
        <div style={{background:`${color}15`,border:`1px solid ${color}40`,borderRadius:10,padding:"12px 14px",marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:2,color}}>READINESS SCORE</span>
            <span style={{fontFamily:"'Pirata One',cursive",fontSize:24,color}}>{avg}/5</span>
          </div>
          <div style={{fontSize:11,color:"var(--muted)",fontFamily:"'DM Mono',monospace",lineHeight:1.6}}>{advice}</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"12px 0",background:"var(--border)",border:"1px solid #2a2a2a",borderRadius:8,color:"#666",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>Cancel</button>
          <button onClick={()=>onSave({sleep,fatigue,soreness,mood,avg:parseFloat(avg)})} style={{flex:2,padding:"12px 0",background:`${color}20`,border:`1px solid ${color}50`,borderRadius:8,color,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:1}}>SAVE READINESS</button>
        </div>
      </div>
    </div>
  );
}

// ── SESSION LOG MODAL ──────────────────────────────────────────────
function SessionLogModal({session,logKey,existing,onSave,onClose}){
  const[pace,setPace]=useState(existing?.pace||"");
  const[rpe,setRpe]=useState(existing?.rpe||session.rpe);
  const[feel,setFeel]=useState(existing?.feel||3);
  const[weather,setWeather]=useState(existing?.weather||"");
  const[notes,setNotes]=useState(existing?.notes||"");
  const cfg=T[session.type];
  const isGym=session.type==="gym";
  const[weights2,setWeights2]=useState(existing?.weights||{});
  const exercises=session.gymExercises||[];
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"flex-end"}}>
      <div style={{width:"100%",background:"var(--bg2)",borderRadius:"16px 16px 0 0",padding:24,maxHeight:"85vh",overflowY:"auto",animation:"slideIn 0.2s ease"}}>
        <div style={{fontFamily:"'Pirata One',cursive",fontSize:20,letterSpacing:2,color:cfg.color,marginBottom:4}}>Log Session</div>
        <div style={{fontSize:10,color:"var(--dim)",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:20}}>{session.title.toUpperCase()}</div>
        {/* Weather */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:"var(--muted)",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:8}}>CONDITIONS</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {WEATHER_OPTIONS.map(w=>(
              <button key={w} onClick={()=>setWeather(weather===w?"":w)} style={{padding:"5px 9px",borderRadius:6,border:`1px solid ${weather===w?cfg.color:"var(--border)"}`,background:weather===w?`${cfg.color}20`:"var(--card)",color:weather===w?cfg.color:"var(--dim)",cursor:"pointer",fontSize:12,fontFamily:"'DM Mono',monospace"}}>{w}</button>
            ))}
          </div>
        </div>
        {!isGym&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,color:"var(--muted)",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:6}}>ACTUAL PACE (optional)</div>
            <input type="text" placeholder="e.g. 4:28/km avg or 4:26, 4:27, 4:29..." value={pace} onChange={e=>setPace(e.target.value)}/>
          </div>
        )}
        {isGym&&exercises.length>0&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,color:"var(--muted)",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:10}}>WEIGHTS USED</div>
            {exercises.map(ex=>(
              <div key={ex} style={{marginBottom:10}}>
                <div style={{fontSize:11,color:"#bbb",fontFamily:"'DM Mono',monospace",marginBottom:4}}>{ex}</div>
                <input type="text" placeholder="e.g. 62.5kg" value={weights2[ex]||""} onChange={e=>setWeights2(p=>({...p,[ex]:e.target.value}))}/>
              </div>
            ))}
          </div>
        )}
        <div style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:10,color:"var(--muted)",fontFamily:"'DM Mono',monospace",letterSpacing:2}}>ACTUAL RPE</span>
            <span style={{fontFamily:"'Pirata One',cursive",fontSize:18,color:rpe>=8?"#E8FF47":rpe>=6?"#47C8FF":"#47FFB8"}}>{rpe}/10</span>
          </div>
          <Slider value={rpe} onChange={setRpe} min={1} max={10} color={rpe>=8?"#E8FF47":rpe>=6?"#47C8FF":"#47FFB8"} labels={["1","","","","5","","","","","10"]}/>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:10,color:"var(--muted)",fontFamily:"'DM Mono',monospace",letterSpacing:2}}>HOW IT FELT</span>
            <span style={{fontFamily:"'Pirata One',cursive",fontSize:18,color:"#FF6B47"}}>{["","Awful","Hard","OK","Good","Great"][feel]}</span>
          </div>
          <Slider value={feel} onChange={setFeel} color="#FF6B47" labels={["Awful","Hard","OK","Good","Great"]}/>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:10,color:"var(--muted)",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:6}}>NOTES</div>
          <textarea rows={3} placeholder="How did it go? What to remember for next time..." value={notes} onChange={e=>setNotes(e.target.value)} style={{resize:"none"}}/>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"12px 0",background:"var(--border)",border:"1px solid #2a2a2a",borderRadius:8,color:"#666",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>Cancel</button>
          <button onClick={()=>onSave({pace,rpe,feel,weather,notes,weights:weights2})} style={{flex:2,padding:"12px 0",background:`${cfg.color}20`,border:`1px solid ${cfg.color}50`,borderRadius:8,color:cfg.color,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:1}}>SAVE LOG</button>
        </div>
      </div>
    </div>
  );
}

// ── MOBILITY PANEL ─────────────────────────────────────────────────
function MobilityPanel({type,title,color}){
  const[open,setOpen]=useState(false);
  const moves=MOBILITY[type]||[];
  return(
    <div style={{background:"var(--card)",borderRadius:8,marginTop:8,border:`1px solid ${color}25`}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",background:"none",border:"none",padding:"10px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:13}}>🧘</span>
          <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color,letterSpacing:1}}>{title}</span>
        </div>
        <span style={{fontSize:12,color:"#444"}}>{open?"▲":"▼"}</span>
      </button>
      {open&&<div style={{padding:"0 14px 12px"}}>
        {moves.map((m,i)=>(
          <div key={i} style={{padding:"8px 0",borderBottom:i<moves.length-1?"1px solid #1e1e1e":"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
              <span style={{fontSize:12,color:"#ccc",fontFamily:"'Barlow',sans-serif",fontWeight:500}}>{m.name}</span>
              <span style={{fontSize:10,color:color,fontFamily:"'DM Mono',monospace"}}>{m.duration}</span>
            </div>
            <div style={{fontSize:10,color:"var(--dim)",fontFamily:"'DM Mono',monospace",lineHeight:1.5}}>{m.cue}</div>
          </div>
        ))}
      </div>}
    </div>
  );
}

// ── COOLDOWN PANEL ─────────────────────────────────────────────────
function CooldownPanel({type,color}){
  const[open,setOpen]=useState(false);
  const text=COOLDOWN[type];
  if(!text)return null;
  return(
    <div style={{background:"var(--card)",borderRadius:8,marginTop:8,border:`1px solid ${color}25`}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",background:"none",border:"none",padding:"10px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:13}}>🏁</span>
          <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color,letterSpacing:1}}>COOL-DOWN PROTOCOL</span>
        </div>
        <span style={{fontSize:12,color:"#444"}}>{open?"▲":"▼"}</span>
      </button>
      {open&&<div style={{padding:"0 14px 12px",fontSize:11,color:"var(--muted)",fontFamily:"'DM Mono',monospace",lineHeight:1.8}}>{text}</div>}
    </div>
  );
}

// ── SESSION CARD (collapsible + injury aware) ────────────────────
function SessionCard({s,sessionKey,checked,isMissed,isPartial,onToggle,onMiss,onPartial,onLog,logData,injuryFlags,paces}){
  const[collapsed,setCollapsed]=useState(true);
  const[tickAnim,setTickAnim]=useState(false);
  const cfg=T[s.type];
  const cardBg=checked?"#0a140a":isMissed?"#1a0a0a":isPartial?"#1a1505":"var(--card)";
  const borderCol=checked?"#47FFB8":isMissed?"#FF4747":isPartial?"#FFB347":cfg.color;
  const isActioned=checked||isMissed||isPartial;
  const injuredZones=Object.entries(injuryFlags||{}).filter(([,v])=>v).map(([k])=>k);
  const hasWarning=injuredZones.some(z=>{const m={"Left hamstring":["run","gym"],"Right hamstring":["run","gym"],"Left calf":["run"],"Right calf":["run"],"Left knee":["run","gym"],"Right knee":["run","gym"],"Lower back":["gym","run"],"Hip flexor":["run","gym"],"Achilles":["run"],"Shoulder":["gym","swim"]};return m[z]&&m[z].includes(s.type);});
  const handleToggle=()=>{setTickAnim(true);setTimeout(()=>setTickAnim(false),400);onToggle(sessionKey);};
  return(
    <div style={{background:cardBg,borderRadius:10,marginBottom:8,borderLeft:`3px solid ${borderCol}`,transition:"all 0.25s",opacity:isActioned?0.85:1}}>
      <div style={{padding:"12px 14px",cursor:!isActioned?"pointer":"default"}} onClick={()=>!isActioned&&setCollapsed(c=>!c)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
              <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:2,color:checked?"#47FFB8":isMissed?"#FF4747":cfg.color,background:`${checked?"#47FFB8":isMissed?"#FF4747":cfg.color}22`,padding:"2px 7px",borderRadius:3}}>{s.slot}</span>
              {s.time&&s.time!=="-"&&s.time!=="—"&&<span style={{fontSize:9,color:"#777",fontFamily:"'DM Mono',monospace"}}>{s.time}</span>}
              <span style={{fontSize:9,color:"var(--dim)",fontFamily:"'DM Mono',monospace"}}>{s.duration}</span>
              {isMissed&&<span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#FF4747",background:"#FF474718",padding:"2px 7px",borderRadius:3}}>MISSED</span>}
              {isPartial&&<span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#FFB347",background:"#FFB34718",padding:"2px 7px",borderRadius:3}}>PARTIAL</span>}
              {hasWarning&&!isActioned&&<span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#FFB347",background:"#FFB34720",padding:"2px 7px",borderRadius:3}}>⚠️ INJURY</span>}
            </div>
            <div style={{fontFamily:"'Pirata One',cursive",fontSize:19,letterSpacing:1,color:checked?"#47FFB8":isMissed?"#FF6666":isPartial?"#FFB347":"var(--text)",textDecoration:isActioned?"line-through":"none"}}>{cfg.icon} {s.title}</div>
          </div>
          <div style={{display:"flex",gap:5,marginLeft:10,flexShrink:0,alignItems:"center"}}>
            {!isActioned&&<span style={{fontSize:10,color:"var(--border)"}}>{collapsed?"▼":"▲"}</span>}
            <button onClick={e=>{e.stopPropagation();handleToggle();}} style={{width:32,height:32,borderRadius:7,border:`2px solid ${checked?"#47FFB8":"var(--border)"}`,background:checked?"#47FFB825":"var(--card)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",animation:tickAnim?"tickBounce 0.4s ease":"none",fontSize:15}}>
              <span style={{color:checked?"#47FFB8":"#444"}}>✓</span>
            </button>
            <button onClick={e=>{e.stopPropagation();onPartial(sessionKey);}} style={{width:32,height:32,borderRadius:7,border:`2px solid ${isPartial?"#FFB347":"var(--border)"}`,background:isPartial?"#FFB34725":"var(--card)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",fontSize:13}}>
              <span style={{color:isPartial?"#FFB347":"#444"}}>½</span>
            </button>
            <button onClick={e=>{e.stopPropagation();onMiss(sessionKey);}} style={{width:32,height:32,borderRadius:7,border:`2px solid ${isMissed?"#FF4747":"var(--border)"}`,background:isMissed?"#FF474725":"var(--card)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",fontSize:15}}>
              <span style={{color:isMissed?"#FF4747":"#444"}}>✕</span>
            </button>
          </div>
        </div>
      </div>
      {!collapsed&&(
        <div style={{padding:"0 14px 14px"}}>
          {hasWarning&&<div style={{background:"#FFB34715",border:"1px solid #FFB34730",borderRadius:8,padding:"8px 12px",marginBottom:10}}>
            <div style={{fontSize:9,color:"#FFB347",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:3}}>INJURY ADVISORY</div>
            <div style={{fontSize:11,color:"var(--muted)",fontFamily:"'DM Mono',monospace",lineHeight:1.5}}>You have a flagged niggle that may affect this session. Consider reducing intensity. One modified session beats three missed ones.</div>
          </div>}
          {s.longRunData&&(
            <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
              <div style={{background:"#47FFB815",border:"1px solid #47FFB830",borderRadius:6,padding:"4px 10px",display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:9,color:"#47FFB8",fontFamily:"'DM Mono',monospace"}}>TIME</span><span style={{fontFamily:"'Pirata One',cursive",fontSize:16,color:"#47FFB8"}}>{s.longRunData.mins} min</span></div>
              <div style={{background:"#E8FF4715",border:"1px solid #E8FF4730",borderRadius:6,padding:"4px 10px",display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:9,color:"#E8FF47",fontFamily:"'DM Mono',monospace"}}>DIST</span><span style={{fontFamily:"'Pirata One',cursive",fontSize:16,color:"#E8FF47"}}>~{s.longRunData.km}km</span></div>
            </div>
          )}
          {s.paceKeys&&s.paceKeys.length>0&&(
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
              {s.paceKeys.map(k=>{const p=(paces||PACES)[k];if(!p)return null;return(
                <span key={k} style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:10,fontFamily:"'DM Mono',monospace",background:`${p.color}22`,border:`1px solid ${p.color}50`,borderRadius:4,padding:"2px 7px",whiteSpace:"nowrap"}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:p.color,flexShrink:0}}/><span style={{color:p.color,letterSpacing:0.5}}>{p.pace}</span><span style={{color:"#666",letterSpacing:1,fontSize:9}}>{p.label.toUpperCase()}</span>
                </span>
              );})}
            </div>
          )}
          <ul style={{margin:"0 0 8px",padding:0,listStyle:"none"}}>
            {s.details.map((d,i)=>(<li key={i} style={{fontSize:11,color:"var(--muted)",fontFamily:"'DM Mono',monospace",padding:"3px 0",borderBottom:i<s.details.length-1?"1px solid #1e1e1e":"none",lineHeight:1.6}}><span style={{color:cfg.color,marginRight:5}}>›</span>{d}</li>))}
          </ul>
          <div style={{display:"flex",gap:3,alignItems:"center",marginTop:6,marginBottom:8}}>
            <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:"#666",marginRight:4,letterSpacing:1}}>RPE</span>
            {Array.from({length:10}).map((_,i)=>(<div key={i} style={{width:10,height:4,borderRadius:2,background:i<s.rpe?s.rpe>=8?"#E8FF47":s.rpe>=6?"#47C8FF":"#47FFB8":"var(--border)"}}/>))}
            <span style={{fontSize:9,color:"var(--dim)",marginLeft:3,fontFamily:"'DM Mono',monospace"}}>{s.rpe}/10</span>
          </div>
          {s.preRun&&<MobilityPanel type="preRun" title="PRE-RUN" color={cfg.color}/>}
          {s.cooldown&&<CooldownPanel type={s.cooldown} color={cfg.color}/>}
          {s.mobility&&<MobilityPanel type={s.mobility} title={s.type==="gym"?"POST-GYM MOBILITY":"POST-RUN MOBILITY"} color={cfg.color}/>}
          <div style={{display:"flex",gap:8,marginTop:10,alignItems:"center"}}>
            <button onClick={onLog} style={{flex:1,padding:"8px 0",background:logData?"#47FFB815":"var(--card)",border:`1px solid ${logData?"#47FFB840":"var(--border)"}`,borderRadius:6,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:10,color:logData?"#47FFB8":"#666",letterSpacing:1}}>
              {logData?"✓ LOGGED — TAP TO EDIT":"📝 LOG THIS SESSION"}
            </button>
            {logData&&<div style={{fontSize:11}}>{["","😖","😤","😐","😊","🤩"][logData.feel]}{logData.weather?" "+logData.weather.split(" ")[0]:""}</div>}
          </div>
          {logData?.pace&&<div style={{fontSize:10,color:"#777",fontFamily:"'DM Mono',monospace",marginTop:4}}>Pace: {logData.pace}</div>}
          {logData?.notes&&<div style={{fontSize:10,color:"var(--dim)",fontFamily:"'DM Mono',monospace",marginTop:2,lineHeight:1.5}}>"{logData.notes}"</div>}
        </div>
      )}
      {collapsed&&logData&&(
        <div style={{padding:"0 14px 10px",display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:10,color:"#47FFB8",fontFamily:"'DM Mono',monospace"}}>✓ Logged</span>
          {logData.pace&&<span style={{fontSize:10,color:"var(--dim)",fontFamily:"'DM Mono',monospace"}}>· {logData.pace}</span>}
          {logData.weather&&<span style={{fontSize:12}}>{logData.weather.split(" ")[0]}</span>}
          <button onClick={e=>{e.stopPropagation();onLog();}} style={{marginLeft:"auto",fontSize:9,color:"#444",background:"none",border:"none",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>edit</button>
        </div>
      )}
    </div>
  );
}

// ── ADD SESSION MODAL ─────────────────────────────────────────────

  {type:"run",   title:"Easy Run",         slot:"AM",time:"06:30",duration:"30 min",rpe:4,paceKeys:["easy"],     details:["Fully easy @ easy pace","Focus on form and breathing","No watch pressure today"],cooldown:"easy",  mobility:"postRun",preRun:true},
  {type:"run",   title:"Tempo Run",        slot:"AM",time:"06:30",duration:"40 min",rpe:7,paceKeys:["tempo"],    details:["10 min easy warm-up","20 min @ tempo pace","10 min easy cool-down"],cooldown:"tempo",mobility:"postRun",preRun:true},
  {type:"run",   title:"Easy Strides",     slot:"AM",time:"06:30",duration:"25 min",rpe:4,paceKeys:["easy"],     details:["15 min easy jog","6×20s strides at 5K effort","Full recovery between each"],cooldown:"easy",mobility:"postRun",preRun:true},
  {type:"gym",   title:"Core & Mobility",  slot:"PM",time:"19:00",duration:"30 min",rpe:3,paceKeys:[],           details:["Dead bug 3×10","Pallof press 3×12","Copenhagen plank 3×20s each","Hollow body hold 3×30s","10 min foam roll"],cooldown:"gym",mobility:"postGym",preRun:false,gymExercises:[]},

  {type:"swim",  title:"Easy Swim",        slot:"PM",time:"19:00",duration:"30 min",rpe:3,paceKeys:[],           details:["800m easy mixed stroke","Focus on breathing rhythm","10 min poolside mobility"],cooldown:"swim",mobility:null,preRun:false},
  {type:"cycle", title:"Easy Spin",        slot:"AM",time:"06:30",duration:"45 min",rpe:3,paceKeys:[],           details:["Zone 2 only — 60-70% max HR","Cadence 85-90 rpm","No targets — active recovery"],cooldown:"easy",mobility:null,preRun:false},
  {type:"rest",  title:"Active Recovery",  slot:"-", time:"-",   duration:"-",     rpe:1,paceKeys:[],           details:["Light walk 20-30 min","Foam roll quads, calves, glutes","10 min sauna if available"],cooldown:null,mobility:null,preRun:false},
];

function AddSessionModal({onSave,onClose}){
  const[selected,setSelected]=useState(null);
  const[customTitle,setCustomTitle]=useState("");
  const[customTime,setCustomTime]=useState("18:00");
  const[customSlot,setCustomSlot]=useState("PM");
  const[customDuration,setCustomDuration]=useState("45 min");
  const[customNotes,setCustomNotes]=useState("");

  const handleSave=()=>{
    if(selected===null)return;
    const tmpl=SESSION_TEMPLATES[selected];
    const session={
      ...tmpl,
      title:customTitle||tmpl.title,
      time:customTime,
      slot:customSlot,
      duration:customDuration,
      details:[...tmpl.details,...(customNotes?[customNotes]:[])],
      isCustom:true,
    };
    onSave(session);
  };

  const cfg=selected!==null?T[SESSION_TEMPLATES[selected].type]:null;

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:1000,display:"flex",alignItems:"flex-end"}}>
      <div style={{width:"100%",background:"var(--bg2)",borderRadius:"16px 16px 0 0",padding:24,maxHeight:"88vh",overflowY:"auto",animation:"slideIn 0.2s ease"}}>
        <div style={{fontFamily:"'Pirata One',cursive",fontSize:22,letterSpacing:2,marginBottom:4}}>Add Session</div>
        <div style={{fontSize:9,color:"var(--dim)",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:16}}>SELECT A SESSION TYPE</div>

        {/* Template picker */}
        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
          {SESSION_TEMPLATES.map((t,i)=>{
            const c=T[t.type];
            return(
              <button key={i} onClick={()=>{setSelected(i);setCustomTitle(t.title);setCustomTime(t.time);setCustomSlot(t.slot);setCustomDuration(t.duration);}} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:8,border:`1px solid ${selected===i?c.color:"var(--border)"}`,background:selected===i?`${c.color}15`:"var(--card)",cursor:"pointer",textAlign:"left"}}>
                <span style={{fontSize:18}}>{c.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Pirata One',cursive",fontSize:15,color:selected===i?c.color:"var(--text)",letterSpacing:1}}>{t.title}</div>
                  <div style={{fontSize:10,color:"var(--dim)",fontFamily:"'DM Mono',monospace"}}>{t.duration} · RPE {t.rpe}</div>
                </div>
                {selected===i&&<span style={{color:c.color}}>✓</span>}
              </button>
            );
          })}
        </div>

        {/* Customise */}
        {selected!==null&&(
          <div style={{borderTop:`1px solid var(--border)`,paddingTop:16,marginBottom:16}}>
            <div style={{fontSize:9,color:cfg?.color,fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:12}}>CUSTOMISE</div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,color:"var(--dim)",fontFamily:"'DM Mono',monospace",marginBottom:4}}>TITLE</div>

// ── STATS TAB ─────────────────────────────────────────────────────
function StatsTab({sessionLogs,fiveKTimes,setFiveKTimes}){
  const[paceInput,setPaceInput]=useState("");
  const[paceResult,setPaceResult]=useState(null);
  const[newTime,setNewTime]=useState("");
  const[newWk,setNewWk]=useState(1);

  const prs=React.useMemo(()=>{
    let fastest=null;
    const heaviest={};
    Object.values(sessionLogs).forEach(log=>{
      if(log.pace){const s=paceToSecs(log.pace);if(s&&(!fastest||s<fastest))fastest=s;}
      if(log.weights){Object.entries(log.weights).forEach(([ex,val])=>{const kg=parseFloat(val);if(!isNaN(kg)&&(!heaviest[ex]||kg>heaviest[ex]))heaviest[ex]=kg;});}
    });
    return{fastest,heaviest};
  },[sessionLogs]);

  const calcPace=()=>{
    const s=paceToSecs(paceInput);
    if(!s){setPaceResult({error:"Enter pace as m:ss e.g. 4:28"});return;}
    const lo=paceToSecs("4:25"),hi=paceToSecs("4:30");
    const mid=(lo+hi)/2;
    const status=s<=lo?"ahead":s<=hi?"on target":"behind";
    const diff=Math.abs(Math.round(s-mid));
    const nextPace=status==="ahead"?secsToStr(Math.max(s-3,lo-5)):status==="behind"?secsToStr(s-2):secsToStr(lo);
    setPaceResult({status,diff,pace:secsToStr(s),nextPace,color:status==="ahead"?"#47FFB8":status==="on target"?"#E8FF47":"#FF6B47"});
  };

  const addTime=()=>{
    if(!newTime)return;
    const existing=fiveKTimes.find(t=>t.week===newWk);
    let updated=existing?fiveKTimes.map(t=>t.week===newWk?{...t,time:newTime}:t):[...fiveKTimes,{week:newWk,time:newTime}].sort((a,b)=>a.week-b.week);
    setFiveKTimes(updated);
    try{localStorage.setItem("sc_5ktimes",JSON.stringify(updated))}catch{}
    setNewTime("");
    setPaceResult(null);
  };

  const sortedTimes=fiveKTimes.slice().sort((a,b)=>a.week-b.week);
  const target=23*60;
  const allSecs=sortedTimes.map(t=>paceToSecs(t.time)||target);
  const maxS=Math.max(...allSecs,target+60);
  const minS=Math.min(...allSecs,target-60);

  return(
    <div style={{padding:"16px 20px 0"}}>
      <div style={{fontFamily:"'Pirata One',cursive",fontSize:28,letterSpacing:2,marginBottom:14}}>Stats</div>

      {/* Pace Calculator */}
      <div style={{background:"var(--card)",borderRadius:10,padding:"14px",marginBottom:16}}>
        <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:3,color:"#E8FF47",marginBottom:10}}>PACE CALCULATOR</div>
        <div style={{fontSize:10,color:"var(--dim)",fontFamily:"'DM Mono',monospace",lineHeight:1.6,marginBottom:10}}>Enter your actual 400m rep pace to see if you're on target and what to aim for next session.</div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input type="text" placeholder="e.g. 4:28" value={paceInput} onChange={e=>setPaceInput(e.target.value)} style={{flex:1}}/>
          <button onClick={calcPace} style={{padding:"8px 14px",background:"#E8FF4720",border:"1px solid #E8FF4740",borderRadius:6,color:"#E8FF47",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>CHECK</button>
        </div>
        {paceResult&&!paceResult.error&&(
          <div style={{background:`${paceResult.color}12`,border:`1px solid ${paceResult.color}30`,borderRadius:8,padding:"12px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontFamily:"'Pirata One',cursive",fontSize:20,color:paceResult.color}}>{paceResult.pace}/km</span>
              <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:paceResult.color,background:`${paceResult.color}20`,padding:"3px 8px",borderRadius:4,letterSpacing:1}}>{paceResult.status.toUpperCase()}</span>
            </div>
            <div style={{fontSize:11,color:"#777",fontFamily:"'DM Mono',monospace",lineHeight:1.6}}>
              {paceResult.status==="on target"?"Right on target — hold this intensity next session.":paceResult.status==="ahead"?`${paceResult.diff}s/km ahead — you can push harder. Next session aim for ${paceResult.nextPace}/km.`:`${paceResult.diff}s/km behind — focus on relaxed form. Try ${paceResult.nextPace}/km next session.`}
            </div>
          </div>
        )}
        {paceResult?.error&&<div style={{fontSize:11,color:"#FF4747",fontFamily:"'DM Mono',monospace"}}>{paceResult.error}</div>}
      </div>

      {/* 5K Progress */}
      <div style={{background:"var(--card)",borderRadius:10,padding:"14px",marginBottom:16}}>
        <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:3,color:"#FF6B47",marginBottom:12}}>5K PROGRESS GRAPH</div>
        <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
          <input type="text" placeholder="mm:ss e.g. 22:45" value={newTime} onChange={e=>setNewTime(e.target.value)} style={{flex:1,minWidth:100}}/>
          <select value={newWk} onChange={e=>setNewWk(Number(e.target.value))} style={{background:"var(--card)",border:"1px solid #2a2a2a",borderRadius:6,color:"var(--text)",fontFamily:"'DM Mono',monospace",fontSize:12,padding:"8px 10px",outline:"none"}}>
            {Array.from({length:12},(_,i)=><option key={i+1} value={i+1}>Week {i+1}</option>)}
          </select>
          <button onClick={addTime} style={{padding:"8px 12px",background:"#FF6B4720",border:"1px solid #FF6B4740",borderRadius:6,color:"#FF6B47",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>ADD</button>
        </div>
        {sortedTimes.length===0?(
          <div style={{textAlign:"center",padding:"20px 0",color:"var(--border)",fontFamily:"'DM Mono',monospace",fontSize:11}}>Log time trials to see your progress</div>
        ):(
          <div>
            <svg width="100%" height="130" viewBox="0 0 300 130" preserveAspectRatio="none" style={{overflow:"visible"}}>
              {/* Target line */}
              {(()=>{const ty=110-((target-minS)/(maxS-minS+1))*90;return<line x1="0" y1={Math.max(10,ty)} x2="300" y2={Math.max(10,ty)} stroke="#FF6B47" strokeWidth="1" strokeDasharray="5,4" opacity="0.5"/>;})}
              {/* Bars */}
              {sortedTimes.map((t,i)=>{
                const s=paceToSecs(t.time)||target;
                const barH=Math.max(8,((maxS-s)/(maxS-minS+1))*90);
                const x=sortedTimes.length===1?150:(i/(sortedTimes.length-1))*260+20;
                const col=s<=target?"#47FFB8":"#FF6B47";
                return<g key={i}>
                  <rect x={x-10} y={110-barH} width={20} height={barH} fill={col} opacity={0.65} rx="2"/>
                  <text x={x} y={125} textAnchor="middle" fill="var(--dim)" fontSize="8" fontFamily="DM Mono,monospace">W{t.week}</text>
                  <text x={x} y={110-barH-5} textAnchor="middle" fill={col} fontSize="8" fontFamily="DM Mono,monospace">{t.time}</text>
                </g>;
              })}
            </svg>
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:4}}>
              <span style={{fontSize:9,color:"#FF6B47",fontFamily:"'DM Mono',monospace"}}>— 23:00 target</span>
            </div>
          </div>
        )}
      </div>

      {/* Personal Records */}
      <div style={{background:"var(--card)",borderRadius:10,padding:"14px",marginBottom:16}}>
        <div style={{fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:3,color:"#FFB347",marginBottom:12}}>🏆 PERSONAL RECORDS</div>
        <div style={{padding:"8px 0",borderBottom:`1px solid var(--border)`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontSize:9,color:"var(--dim)",fontFamily:"'DM Mono',monospace",letterSpacing:2}}>FASTEST PACE LOGGED</div>
            <div style={{fontFamily:"'Pirata One',cursive",fontSize:22,color:"#FFB347",marginTop:2}}>{prs.fastest?secsToStr(prs.fastest)+"/km":"—"}</div></div>
            <span style={{fontSize:22}}>⚡</span>
          </div>
        </div>
        {Object.entries(prs.heaviest).slice(0,5).map(([ex,kg])=>(
          <div key={ex} style={{padding:"8px 0",borderBottom:`1px solid var(--border)`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:9,color:"var(--dim)",fontFamily:"'DM Mono',monospace",letterSpacing:2}}>{ex.toUpperCase()}</div>
              <div style={{fontFamily:"'Pirata One',cursive",fontSize:20,color:"#FF6B47",marginTop:2}}>{kg}kg</div></div>
              <span style={{fontSize:20}}>💪</span>
            </div>
          </div>
        ))}
        {!prs.fastest&&Object.keys(prs.heaviest).length===0&&<div style={{fontSize:11,color:"var(--border)",fontFamily:"'DM Mono',monospace",textAlign:"center",padding:"8px 0"}}>Log sessions to start building your records</div>}
      </div>
    </div>
  );
}

// ── SHARE WEEK MODAL ──────────────────────────────────────────────
function ShareWeekModal({week,wkNum,wkData,checked,missed,sessionLogs,phase,startDate,theme,goalCfg,onClose}){
  const isCrimson=theme==="crimson";
  const bgColor=isCrimson?"#0a0000":"#0a0a0a";
  const cardColor=isCrimson?"#200000":"#141414";
  const textColor=isCrimson?"#ffe8e8":"#f0f0f0";
  const dimColor=isCrimson?"#cc4444":"#555555";
  const accentColor=(goalCfg?.color)||phase?.color||"#E8FF47";
  const canvasRef=React.useRef(null);
  const sKey2=(w,di,si)=>`${w}-${di}-${si}`;

  React.useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const W=canvas.width,H=canvas.height;

    // Background
    ctx.fillStyle=bgColor;
    ctx.fillRect(0,0,W,H);

    // Top accent bar
    ctx.fillStyle=accentColor;
    ctx.fillRect(0,0,W,4);

    // Title
    ctx.fillStyle=textColor;
    ctx.font="bold 28px serif";
    ctx.fillText("SUPPER CLUB",20,44);

    ctx.fillStyle=accentColor;
    ctx.font="14px monospace";
    ctx.fillText(`WEEK ${wkNum} · ${(goalCfg?.label||phase?.label||"").toUpperCase()}`,20,66);

    if(startDate){
      const d=addDays(new Date(startDate),(week)*7);
      ctx.fillStyle=dimColor;
      ctx.font="11px monospace";
      ctx.fillText(d.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}),20,84);
    }

    // Separator
    ctx.fillStyle=isCrimson?"#3d0a0a":"#1e1e1e";
    ctx.fillRect(0,96,W,1);

    // Sessions
    let y=116;
    const typeColors={run:"#E8FF47",cycle:"#47C8FF",swim:"#47FFB8",gym:"#FF6B47",rest:"#666666"};
    wkData.forEach((day,di)=>{
      day.sessions.forEach((s,si)=>{
        const k=sKey2(week,di,si);
        const isDone=checked[k];
        const isMiss=missed[k];
        const log=sessionLogs[`log-${week}-${di}-${si}`];
        const col=typeColors[s.type]||"#888888";

        // dot
        ctx.fillStyle=isDone?"#47FFB8":isMiss?"#FF4747":col;
        ctx.beginPath();ctx.arc(20,y-4,4,0,Math.PI*2);ctx.fill();

        // day label
        ctx.fillStyle=dimColor;
        ctx.font="10px monospace";
        ctx.fillText(day.day,32,y);

        // session name
        ctx.fillStyle=isDone?"#47FFB8":isMiss?"#774444":textColor;
        ctx.font=`${isDone||isMiss?"italic ":""}12px monospace`;
        const title=s.title.length>28?s.title.slice(0,27)+"…":s.title;
        ctx.fillText(title,72,y);

        // status / pace
        if(isDone){
          ctx.fillStyle="#47FFB8";
          ctx.font="10px monospace";
          ctx.fillText(log?.pace?`✓ ${log.pace}`:"✓ DONE",W-120,y);
        } else if(isMiss){
          ctx.fillStyle="#FF4747";
          ctx.font="10px monospace";
          ctx.fillText("✗ MISSED",W-90,y);
        }

        y+=22;
        if(y>H-80)return;
      });
    });

    // Stats bar
    const done=wkData.reduce((a,d,di)=>a+d.sessions.filter((_,si)=>checked[sKey2(week,di,si)]).length,0);
    const total=wkData.reduce((a,d)=>a+d.sessions.length,0);
    const miss=wkData.reduce((a,d,di)=>a+d.sessions.filter((_,si)=>missed[sKey2(week,di,si)]).length,0);

    ctx.fillStyle=cardColor;
    ctx.roundRect(16,H-68,W-32,52,8);
    ctx.fill();

    ctx.fillStyle=accentColor;
    ctx.font="bold 20px serif";
    ctx.fillText(`${done}/${total}`,24,H-40);
    ctx.fillStyle=dimColor;
    ctx.font="10px monospace";
    ctx.fillText("SESSIONS DONE",24,H-24);

    if(miss>0){
      ctx.fillStyle="#FF4747";
      ctx.font="bold 20px serif";
      ctx.fillText(`${miss}`,120,H-40);
      ctx.fillStyle=dimColor;
      ctx.font="10px monospace";
      ctx.fillText("MISSED",120,H-24);
    }

    ctx.fillStyle=isCrimson?"#661111":"#333333";
    ctx.font="10px monospace";
    ctx.fillText("harryjudge.github.io/thesupperclub",W-260,H-24);

  },[week,checked,missed,sessionLogs]);

  const download=()=>{
    const canvas=canvasRef.current;
    const url=canvas.toDataURL("image/png");
    const a=document.createElement("a");a.href=url;a.download=`supperclub-week${wkNum}.png`;a.click();
  };

  const share=async()=>{
    const canvas=canvasRef.current;
    canvas.toBlob(async blob=>{
      const file=new File([blob],`supperclub-week${wkNum}.png`,{type:"image/png"});
      if(navigator.share&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:`Supper Club — Week ${wkNum}`,text:`Week ${wkNum} training card`});
      } else { download(); }
    });
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:2000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:400,background:"var(--bg2)",borderRadius:16,padding:20,animation:"slideIn 0.3s ease"}}>
        <div style={{fontFamily:"'Pirata One',cursive",fontSize:20,letterSpacing:2,marginBottom:12}}>Week {wkNum} Card</div>
        <canvas ref={canvasRef} width={400} height={Math.min(120+wkData.reduce((a,d)=>a+d.sessions.length,0)*22+80,600)} style={{width:"100%",borderRadius:8,marginBottom:12,border:`1px solid var(--border)`}}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"11px 0",background:"var(--border)",border:"1px solid #2a2a2a",borderRadius:8,color:"#666",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>CLOSE</button>
          <button onClick={download} style={{flex:1,padding:"11px 0",background:"#47C8FF18",border:"1px solid #47C8FF40",borderRadius:8,color:"#47C8FF",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>↓ SAVE</button>
          <button onClick={share} style={{flex:1,padding:"11px 0",background:"#E8FF4720",border:"1px solid #E8FF4750",borderRadius:8,color:"#E8FF47",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>↑ SHARE</button>
        </div>
      </div>
    </div>
  );
}

                  <div style={{width:22,height:22,borderRadius:5,border:`2px solid ${done2?"#47FFB8":"var(--vdim)"}`,background:done2?"#47FFB820":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {done2&&<span style={{color:"#47FFB8",fontSize:12}}>✓</span>}

}

// ── MAIN APP ───────────────────────────────────────────────────────
function App(){
  const[week,setWeek]=useState(0);
  const[dayIdx,setDayIdx]=useState(0);
  const[view,setView]=useState("day");
  const[checked,setChecked]=useState(()=>{try{const s=localStorage.getItem("sc_progress");return s?JSON.parse(s):{}}catch{return{}}});
  const[missed,setMissed]=useState(()=>{try{const s=localStorage.getItem("sc_missed");return s?JSON.parse(s):{}}catch{return{}}});
  const[partial,setPartial]=useState(()=>{try{const s=localStorage.getItem("sc_partial");return s?JSON.parse(s):{}}catch{return{}}});
  const[sessionLogs,setSessionLogs]=useState(()=>{try{const s=localStorage.getItem("sc_logs");return s?JSON.parse(s):{}}catch{return{}}});
  const[readiness,setReadiness]=useState(()=>{try{const s=localStorage.getItem("sc_readiness");return s?JSON.parse(s):{}}catch{return{}}});
  const[goal,setGoal]=useState(()=>{try{return localStorage.getItem("sc_goal")||null}catch{return null}});
  const[racePB,setRacePB]=useState(()=>{try{return localStorage.getItem("sc_racepb")||""}catch{return""}});
  const[startDate,setStartDate]=useState(()=>{try{return localStorage.getItem("sc_startdate")||null}catch{return null}});
  const[theme,setTheme]=useState(()=>{try{return localStorage.getItem("sc_theme")||"dark"}catch{return"dark"}});
  const[weekNotes,setWeekNotes]=useState(()=>{try{const s=localStorage.getItem("sc_weeknotes");return s?JSON.parse(s):{}}catch{return{}}});
  const[injuryFlags,setInjuryFlags]=useState(()=>{try{const s=localStorage.getItem("sc_injuries");return s?JSON.parse(s):{}}catch{return{}}});
  const[fiveKTimes,setFiveKTimes]=useState(()=>{try{const s=localStorage.getItem("sc_5ktimes");return s?JSON.parse(s):[]}catch{return[]}});
  const[easyPaceSecs,setEasyPaceSecs]=useState(()=>{try{return parseInt(localStorage.getItem("sc_easypace")||"360")}catch{return 360}});
  const[crossTrainPrefs,setCrossTrainPrefs]=useState(()=>{try{const s=localStorage.getItem("sc_crosstrainprefs");return s?JSON.parse(s):{bike:1,swim:1,gym:2,run:3}}catch{return{bike:1,swim:1,gym:2,run:3}}});

  useEffect(()=>{try{localStorage.setItem("sc_goal",goal||"")}catch{}},[goal]);
  useEffect(()=>{try{localStorage.setItem("sc_racepb",racePB||"")}catch{}},[racePB]);
  useEffect(()=>{try{localStorage.setItem("sc_easypace",easyPaceSecs)}catch{}},[easyPaceSecs]);
  useEffect(()=>{try{localStorage.setItem("sc_crosstrainprefs",JSON.stringify(crossTrainPrefs))}catch{}},[crossTrainPrefs]);

  const weekData=React.useMemo(()=>Array.from({length:12},(_,i)=>makeWeek(i+1,goal||"5K")),[goal]);
  const TOTAL_SESSIONS=React.useMemo(()=>weekData.reduce((a,wk)=>a+wk.reduce((b,d)=>b+d.sessions.length,0),0),[weekData]);
  const PACES_COMPUTED=computePaces(easyPaceSecs);
  const goalCfg=GOAL_CONFIGS[goal||"5K"]||GOAL_CONFIGS["5K"];
  const[showInjury,setShowInjury]=useState(false);
  const[showReset,setShowReset]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[bodyWeight,setBodyWeight]=useState(()=>{try{return parseFloat(localStorage.getItem("sc_bodyweight")||"76")}catch{return 76}});
  const[showOverview,setShowOverview]=useState(false);
  const[showSwap,setShowSwap]=useState(false);
  const[showShare,setShowShare]=useState(false);
  const[showAddSession,setShowAddSession]=useState(false);
  const[customSessions,setCustomSessions]=useState(()=>{try{const s=localStorage.getItem("sc_custom");return s?JSON.parse(s):{}}catch{return{}}});
  const[swaps,setSwaps]=useState(()=>{try{const s=localStorage.getItem("sc_swaps");return s?JSON.parse(s):{}}catch{return{}}});
  const[toast,setToast]=useState(null);
  const[showReadiness,setShowReadiness]=useState(false);
  const[logModal,setLogModal]=useState(null);
  // Real-time countdown — ticks every minute
  const[now,setNow]=useState(()=>new Date());
  useEffect(()=>{
    const t=setInterval(()=>setNow(new Date()),60000);
    return()=>clearInterval(t);
  },[]);
  const touchStartX=useRef(null);
  const th=THEMES[theme]||THEMES.dark;

  useEffect(()=>{try{localStorage.setItem("sc_progress",JSON.stringify(checked))}catch{}},[checked]);
  useEffect(()=>{try{localStorage.setItem("sc_missed",JSON.stringify(missed))}catch{}},[missed]);
  useEffect(()=>{try{localStorage.setItem("sc_partial",JSON.stringify(partial))}catch{}},[partial]);
  useEffect(()=>{try{localStorage.setItem("sc_logs",JSON.stringify(sessionLogs))}catch{}},[sessionLogs]);
  useEffect(()=>{try{localStorage.setItem("sc_readiness",JSON.stringify(readiness))}catch{}},[readiness]);
  useEffect(()=>{try{localStorage.setItem("sc_weeknotes",JSON.stringify(weekNotes))}catch{}},[weekNotes]);
  useEffect(()=>{try{localStorage.setItem("sc_injuries",JSON.stringify(injuryFlags))}catch{}},[injuryFlags]);
  useEffect(()=>{try{localStorage.setItem("sc_theme",theme)}catch{}},[theme]);
  useEffect(()=>{try{localStorage.setItem("sc_bodyweight",bodyWeight)}catch{}},[bodyWeight]);
  useEffect(()=>{try{localStorage.setItem("sc_swaps",JSON.stringify(swaps))}catch{}},[swaps]);
  useEffect(()=>{try{localStorage.setItem("sc_custom",JSON.stringify(customSessions))}catch{}},[customSessions]);

  const handleSwap=(fromIdx,toIdx)=>{
    // Record swap for this week: swap fromIdx and toIdx day indices
    const key=`${week}`;
    setSwaps(p=>{
      const wkSwaps={...(p[key]||{})};
      // Toggle: if already swapped back, remove
      if(wkSwaps[fromIdx]===toIdx){delete wkSwaps[fromIdx];delete wkSwaps[toIdx];}
      else{wkSwaps[fromIdx]=toIdx;wkSwaps[toIdx]=fromIdx;}
      return{...p,[key]:wkSwaps};
    });
    setShowSwap(false);
    showToast(`${wkData[fromIdx].label} ⇄ ${wkData[toIdx].label}`);
  };

  const showToast=msg=>{setToast(msg);clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(null),2400)};
  const handleTouchStart=e=>{if(view==="day")touchStartX.current=e.touches[0].clientX;};
  const handleTouchEnd=e=>{
    if(touchStartX.current===null||view!=="day")return;
    const diff=touchStartX.current-e.changedTouches[0].clientX;
    if(Math.abs(diff)>60){
      if(diff>0)setDayIdx(i=>Math.min(i+1,weekData[week].length-1));
      else setDayIdx(i=>Math.max(i-1,0));
    }
    touchStartX.current=null;
  };
  const toggleSession=key=>{
    setChecked(p=>({...p,[key]:!p[key]}));
    setMissed(p=>{const n={...p};delete n[key];return n;});
    setPartial(p=>{const n={...p};delete n[key];return n;});
  };
  const toggleMissed=key=>{
    setMissed(p=>({...p,[key]:!p[key]}));
    setChecked(p=>{const n={...p};delete n[key];return n;});
    setPartial(p=>{const n={...p};delete n[key];return n;});
  };
  const togglePartial=key=>{
    setPartial(p=>({...p,[key]:!p[key]}));
    setChecked(p=>{const n={...p};delete n[key];return n;});
    setMissed(p=>{const n={...p};delete n[key];return n;});
  };

  useEffect(()=>{
    const day=weekData[week][dayIdx];
    const keys=day.sessions.map((_,si)=>sKey(week,dayIdx,si));
    const allActioned=keys.every(k=>checked[k]||missed[k]||partial[k]);
    const anyDone=keys.some(k=>checked[k]||partial[k]);
    // Only advance if all actioned AND at least one was done (not all missed)
    if(!allActioned||!anyDone)return;
    const ndi=dayIdx+1;
    if(ndi<weekData[week].length){
      const t=setTimeout(()=>{setDayIdx(ndi);showToast(`${day.label} done ✓  →  ${weekData[week][ndi].label}`)},600);
      return()=>clearTimeout(t);
    }else{
      const nwk=week+1;
      if(nwk<12){const t=setTimeout(()=>{if(typeof confetti!=="undefined")confetti({particleCount:100,spread:70,origin:{y:0.4},colors:["#E8FF47","#47FFB8","#47C8FF","#FF6B47"]});setWeek(nwk);setDayIdx(0);showToast(`Week ${week+1} complete! 🏆`)},800);return()=>clearTimeout(t);}
      else showToast("Plan complete! 🏁 Time to race.");
    }
  },[checked,missed,partial]);

  // Streak: consecutive days with all sessions actioned
  const streak=React.useMemo(()=>{
    let s=0;
    outer:for(let w=week;w>=0;w--){
      const days=weekData[w];
      for(let di=days.length-1;di>=0;di--){
        const keys=days[di].sessions.map((_,si)=>sKey(w,di,si));
        if(keys.every(k=>checked[k]||missed[k]||partial[k]))s++;
        else break outer;
      }
    }
    return s;
  },[checked,missed,partial,week]);

  const wkKeys=w=>weekData[w].flatMap((d,di)=>d.sessions.map((_,si)=>sKey(w,di,si)));
  const wkDone=w=>wkKeys(w).filter(k=>checked[k]).length+wkKeys(w).filter(k=>partial[k]).length*0.5;
  const wkMissed=w=>wkKeys(w).filter(k=>missed[k]).length;
  const wkTotal=w=>wkKeys(w).length;
  const done=Object.values(checked).filter(Boolean).length+Object.values(partial).filter(Boolean).length*0.5;
  const missedCount=Object.values(missed).filter(Boolean).length;
  const pct=Math.round((done/TOTAL_SESSIONS)*100);
  const missedPct=Math.round((missedCount/TOTAL_SESSIONS)*100);

  const handleAddSession=(session)=>{
    const key=`${week}-${dayIdx}`;
    setCustomSessions(p=>{
      const existing=p[key]||[];
      return{...p,[key]:[...existing,session]};
    });
    setShowAddSession(false);
    showToast(`${session.title} added ✓`);
  };

  const removeCustomSession=(dayKey,idx)=>{
    setCustomSessions(p=>{
      const existing=[...(p[dayKey]||[])];
      existing.splice(idx,1);
      const next={...p};
      if(existing.length===0)delete next[dayKey];
      else next[dayKey]=existing;
      return next;
    });
  };

  const dayDate=startDate?addDays(new Date(startDate),week*7+dayIdx):null;
  const wkData=weekData[week];

  // Apply swaps + cross-train prefs to wkData
  const wkSwapMap=swaps[String(week)]||{};
  const baseWkData=wkData.map((day,di)=>{
    const swappedFrom=wkSwapMap[di];
    return swappedFrom!==undefined?{...wkData[swappedFrom],day:day.day,label:day.label}:day;
  });
  // Count globally per week — find which day indices have each cross-train type
  const daysWithType=type=>baseWkData.map((d,di)=>d.sessions.some(s=>s.type===type)?di:-1).filter(i=>i>=0);
  const keepBike=new Set(daysWithType("cycle").slice(0,crossTrainPrefs.bike));
  const keepSwim=new Set(daysWithType("swim").slice(0,crossTrainPrefs.swim));
  const keepGym =new Set(daysWithType("gym").slice(0,crossTrainPrefs.gym));
  const weekdayRunDays=daysWithType("run").filter(di=>di<5);
  const keepRunDays=new Set([...weekdayRunDays.slice(0,(crossTrainPrefs.run??3)),5,6]);
  const restFallback={slot:"-",time:"-",type:"rest",preRun:false,title:"Active Recovery",duration:"-",paceKeys:[],cooldown:null,mobility:null,details:["Light walk or complete rest","Foam roll 10 min","Sauna if available"],rpe:1};
  const effectiveWkData=baseWkData.map((day,di)=>{
    const sessions=day.sessions.filter(s=>{
      if(s.type==="cycle") return keepBike.has(di);
      if(s.type==="swim")  return keepSwim.has(di);
      if(s.type==="gym")   return keepGym.has(di);
      if(s.type==="run")   return keepRunDays.has(di);
      return true;
    });
    return{...day,sessions:sessions.length?sessions:[restFallback]};
  });

  const dayData=effectiveWkData[dayIdx];
  const customDaySessions=(customSessions[`${week}-${dayIdx}`]||[]);
  const wkNum=week+1;
  const isDeload=wkPhase(wkNum,goal||"5K")==="deload";
  const isPeak=wkPhase(wkNum,goal||"5K")==="race";
  const isTaper=wkPhase(wkNum,goal||"5K")==="taper";
  const phase=phases.find(p=>p.weeks.includes(wkNum));
  const todayKey=`r-${week}-${dayIdx}`;
  const todayReadiness=readiness[todayKey];

  const resetPlan=()=>{
    ["sc_progress","sc_missed","sc_logs","sc_readiness","sc_weeknotes","sc_5ktimes","sc_racechecks","sc_startdate","sc_swaps","sc_custom","sc_easypace","sc_goal","sc_racepb","sc_crosstrainprefs","sc_bodyweight","sc_partial"].forEach(k=>{try{localStorage.removeItem(k)}catch{}});
    setChecked({});setMissed({});setSessionLogs({});setReadiness({});setWeekNotes({});setFiveKTimes([]);setPartial({});
    setSwaps({});setCustomSessions({});setEasyPaceSecs(360);setCrossTrainPrefs({bike:1,swim:1,gym:2,run:3});setBodyWeight(76);
    setGoal(null);setRacePB("");
    setWeek(0);setDayIdx(0);setStartDate(null);setShowReset(false);
  };

  // Load score: sum of (RPE × session count) for completed sessions in a week
  const wkLoadScore=w=>{
    let total=0;
    weekData[w].forEach((day,di)=>{
      day.sessions.forEach((s,si)=>{
        const k=sKey(w,di,si);
        if(checked[k]){
          const log=sessionLogs[`log-${w}-${di}-${si}`];
          total+=(log?.rpe||s.rpe);
        }
      });
    });
    return total;
  };

  const exportWeek=()=>{
    let txt=`SUPPER CLUB — Week ${wkNum}\n${"=".repeat(28)}\n\n`;
    if(startDate)txt+=`Week of ${addDays(new Date(startDate),week*7).toLocaleDateString("en-GB",{day:"numeric",month:"long"})}\n\n`;
    effectiveWkData.forEach((day,di)=>{
      txt+=`${day.label.toUpperCase()}\n`;
      day.sessions.forEach((s,si)=>{
        const k=sKey(week,di,si);
        const status=checked[k]?"✓ DONE":missed[k]?"✗ MISSED":"○ PENDING";
        const log=sessionLogs[`log-${week}-${di}-${si}`];
        txt+=`  ${status} ${s.title}${log?.pace?" ["+log.pace+"]":""}\n`;
      });
      txt+="\n";
    });
    if(weekNotes[week])txt+=`Notes:\n${weekNotes[week]}\n`;
    const blob=new Blob([txt],{type:"text/plain"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`supperclub-week${wkNum}.txt`;a.click();URL.revokeObjectURL(url);
    showToast("Week exported ✓");
  };

  const tabs=[["day","DAY"],["paces","PACES"],["stats","STATS"],["race","RACE DAY"],["next","NEXT STEPS"]];

  // First launch: goal selection → calendar
  if(!goal){
    return <GoalSetupModal onSave={({goal:g,raceTime,easySecs})=>{
      setGoal(g);
      setRacePB(raceTime);
      setEasyPaceSecs(easySecs);
      try{localStorage.setItem("sc_goal",g);localStorage.setItem("sc_racepb",raceTime);localStorage.setItem("sc_easypace",easySecs);}catch{}
    }}/>;
  }
  if(!startDate){
    return <CalendarSetupModal onSave={d=>{setStartDate(d);try{localStorage.setItem("sc_startdate",d)}catch{}}}/>;
  }

  return(

              </div>
              <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
                {Object.entries(T).filter(([k])=>k!=="rest").map(([k,v])=>{
                  const count=effectiveWkData.reduce((a,d)=>a+d.sessions.filter(s=>s.type===k).length,0);
                  if(count===0)return null;
                  return(
                    <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{fontSize:10}}>{v.icon}</span>
                      <span style={{fontSize:9,fontFamily:"'DM Mono',monospace",color:v.color}}>{count}x</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      )}

      {view==="stats"&&<StatsTab sessionLogs={sessionLogs} fiveKTimes={fiveKTimes} setFiveKTimes={setFiveKTimes}/>}
      {view==="race"&&<RaceDayTab goal={goal||"5K"}/>}
      {view==="next"&&<PostPlanTab goal={goal||"5K"} racePB={racePB}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
